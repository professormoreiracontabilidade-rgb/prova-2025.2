al, foram produzidas 12.000 unidades de\nqueijo. Nesse mesmo mês, vendeu 9.000 unidades a um preço unitário de R$ 25,00. Os custos variáveis\ntotais somaram R$ 135.000,00 e os custos fixos totais foram R$ 42.000,00. As despesas fixas totalizaram R$\n25.000,00, e as despesas variáveis com comissões aos vendedores corresponderam a 5% do valor de cada\nunidade vendida.\nConsiderando os dados fornecidos e desconsiderando efeitos tributários, os lucros líquidos com as vendas\nem julho de 2025, utilizando, respectivamente, os métodos de custeio por absorção e custeio variável, foram\nde\n(A) R$ 45.470,00 e R$ 11.750,00.\n(B) R$ 56.000,00 e R$ 56.000,00.\n(C) R$ 45.470,00 e R$ 12.500,00.\n(D) R$ 56.000,00 e R$ 45.500,00.", "comment": "Vamos resolver passo a passo, separando as duas metodologias.\n1️ - Dados básicos\n•\nProdução: 12.000 unidades\n•\nVendas: 9.000 unidades\n•\nPreço de venda unitário: R$ 25,00\n•\nCustos variáveis totais (para 12.000 un.): R$ 135.000\n•\nCustos fixos totais: R$ 42.000\n•\nDespesas fixas: R$ 25.000\n•\nDespesas variáveis (comissões): 5% sobre vendas\n2️ - Vendas e despesas variáveis\n•\nReceita de vendas: 9.000 × 25 = R$ 225.000\n•\nComissão: 5% × 225.000 = R$ 11.250\n3 - Custos variáveis unitários\nCusto variável unitário = 135.000 ÷ 12.000 = R$ 11,25\nCusto variável das 9.000 vendidas = 9.000 × 11,25 = R$ 101.250\n4 - Custeio por absorção\nNo custeio por absorção:\n•\nOs custos fixos de fabricação (R$ 42.000) são distribuídos no custo unitário de produção.\n•\nCusto de produção por unidade:\nVariável 11,25 + Fixos de produção rateados (42.000 ÷ 12.000 = 3,50) = R$ 14,75\n•\nCusto dos produtos vendidos (CPV): 9.000 × 14,75 = R$ 132.750\n•\nEstoque final: 3.000 × 14,75 = R$ 44.250\nResultado:\nLucro = Receita 225.000 – CPV 132.750 – Despesas variáveis 11.250 – Despesas fixas 25.000 = R$56.000\n✔ Lucro pelo custeio por absorção = R$ 56.000\n5 - Custeio variável (ou direto)\nNeste método:\n•\nApenas custos variáveis vão para o CPV.\nCPV = 9.000 × 11,25 = R$ 101.250\n•\nCustos fixos de fabricação (R$ 42.000) são despesa do período.\nMargem de contribuição:\n225.000 – 101.250 – 11.250 = 112.500\nLucro líquido:\n112.500 – 42.000 – 25.000 = 45.500\n✔ Lucro pelo custeio variável = R$ 45.500\n✅ Gabarito\n(D) R$ 56.000,00 e R$ 45.500,00", "answer": "D"}, {"n": 38, "question": "A Indústria Paranaguá Ltda. utiliza o sistema de custeio baseado em atividades (ABC). No mês de junho de\n2025, foram apurados as seguintes informações para os produtos X, Y e Z:\nProduto Material Direto\n(R$)\nMão\nde\nObra\nDireta (R$)\nPedidos\nde\nMudança\nQuilowatts-hora\n(kWh)\nX\n35.000,00\n18.000,00\n28\n12.000\nY\n40.000,00\n12.000,00\n20\n14.000\nZ\n25.000,00\n10.000,00\n32\n14.000\nTotal\n100.000,00\n40.000,00\n80\n40.000\nOs custos indiretos de manufatura totalizaram R$ 200.000,00, distribuídos entre as seguintes atividades:\n•\nGerenciamento de mudanças de projeto (baseado em pedidos): R$ 140.000,00;\n•\nGeração e uso de energia operacional (baseado em kWh): R$ 60.000,00.\nNo período, foram produzidas 1.200 unidades do produto X, 1.500 unidades do produto Y e 2.000 unidades do\nproduto Z.\nCom base nesses dados, os custos unitários dos produtos X, Y e Z, respectivamente, são\n(A) R$ 98,50; R$ 70,00; R$ 60,00.\n(B) R$ 90,00; R$ 80,00; R$ 65,00.\n(C) R$ 105,00; R$ 74,00; R$ 52,00.\n(D) R$ 100,00; R$ 72,00; R$ 56,00.", "comment": "Vamos resolver passo a passo usando custeio ABC.\nPRODUTO\nMD (R$)\nMOD (R$)\nPEDIDOS\nKWH\nUNIDADES\nX\n35.000\n18.000\n28\n12.000\n1.200\nY\n40.000\n12.000\n20\n14.000\n1.500\nZ\n25.000\n10.000\n32\n14.000\n2.000\nTOTAL\n100.000\n40.000\n80\n40.000\nCustos indiretos totais = R$ 200.000\n•\nGerenciamento de mudanças (base = pedidos): R$ 140.000\n•\nEnergia operacional (base = kWh): R$ 60.000\n2️ - Rateio dos custos indiretos\na) Gerenciamento de mudanças de projeto\nTotal de pedidos = 80\nCusto por pedido = 140.000 ÷ 80 = R$ 1.750 por pedido\nAlocação:\n•\nX: 28 × 1.750 = R$ 49.000\n•\nY: 20 × 1.750 = R$ 35.000\n•\nZ: 32 × 1.750 = R$ 56.000\nb) Energia operacional\nTotal de kWh = 40.000\nCusto por kWh = 60.000 ÷ 40.000 = R$ 1,50 por kWh\nAlocação:\n•\nX: 12.000 × 1,50 = R$ 18.000\n•\nY: 14.000 × 1,50 = R$ 21.000\n•\nZ: 14.000 × 1,50 = R$ 21.000\nProduto MD\nMOD Indiretos (mudança + energia) Total\nX\n35.000 18.000 49.000 + 18.000 = 67.000\n120.000\nY\n40.000 12.000 35.000 + 21.000 = 56.000\n108.000\nZ\n25.000 10.000 56.000 + 21.000 = 77.000\n112.000\nVerificação: 120.000 + 108.000 + 112.000 = 340.000\nCusto Unitário:\nProduto Total Unidades Custo unitário\nX\n120.000 1.200\nR$ 100,00\nY\n108.000 1.500\nR$ 72,00\nZ\n112.000 2.000\nR$ 56,00\n✅ Gabarito\nOs custos unitários de X, Y e Z são, respectivamente:\nR$ 100,00 ; R$ 72,00 ; R$ 56,00\nAlternativa correta: (D)", "answer": ""}, {"n": 39, "question": "Em 31/12/2023, uma sociedade empresária apresentava os seguintes saldos em seus ativos e passivos:\n•\nAtivo Circulante: R$ 50.000,00;\n•\nAtivo Realizável a Longo Prazo: R$ 30.000,00;\n•\nAtivo Imobilizado: R$ 120.000,00;\n•\nPassivo Circulante: R$ 40.000,00;\n•\nPassivo não Circulante: R$ 100.000,00.\nA proporção de capital próprio que financia o ativo da sociedade empresária foi igual a\n(A) 30%.\n(B) 40%.\n(C) 60%.\n(D) 70%.", "comment": "Vamos calcular passo a passo.\n1️ - Determinar o Ativo Total\nAtivo Total = Ativo Circulante + Ativo Realizável a Longo Prazo + Ativo Imobilizado\n50.000 + 30.000 + 120.000 = 200.000\n2️ - Determinar o Passivo Total\nPassivo Total = Passivo Circulante + Passivo Não Circulante\n40.000 + 100.000 = 140.000\n3 - Calcular o Patrimônio Líquido (Capital Próprio)\nPatrimônio Líquido = Ativo Total – Passivo Total\n200.000 − 140.000 = 60.000\nEsse valor representa o capital próprio da empresa.\n4 - Proporção de capital próprio que financia o ativo\nProporção = Patrimônio Líquido ÷ Ativo Total\n60.000 ÷ 200.000 = 0,30 = 30%\n✅ Gabarito: (A) 30%", "answer": "A"}, {"n": 40, "question": "Uma fábrica produz e vende apenas malas de mão. O custo fixo mensal da fábrica é de R$ 10.000,00. As malas\nsão produzidas em dois modelos: com duas rodinhas e com quatro rodinhas.\nAs malas com duas rodinhas são vendidas por R$ 200,00 cada, enquanto as malas com quatro rodinhas são\nvendidas por R$ 370,00 cada. Além disso, o custo variável da mala com duas rodinhas é de R$ 80,00, e o custo\nvariável da de quatro rodinhas é de R$ 140,00.\nNo primeiro trimestre de 2025, a fábrica tinha em estoque 500 unidades de rodinhas e não era possível adquirir\nmais. No período, as demandas pela produção de malas com duas e quatro rodinhas eram, respectivamente,\nde 80 e de 100.\nConsiderando que a fábrica tinha como objetivo maximizar o seu lucro, assinale a opção que indica a produção\nde malas de duas e quatro rodinhas, respectivamente, no período.\n(A) 50 e 85.\n(B) 50 e 100.\n(C) 80 e 85.\n(D) 80 e 100.", "comment": "Vamos resolver passo a passo.\n1️ - Informações de custos e receitas\nProduto\nPreço de\nvenda\nCusto\nvariável\nMargem de contribuição por\nunidade\n2 rodinhas\nR$ 200\nR$ 80\nR$ 120\n4 rodinhas\nR$ 370\nR$ 140\nR$ 230\n2️ - Restrição principal: número de rodinhas\n•\nEstoque disponível: 500 rodinhas no total.\n•\nCada mala de 2 rodinhas consome 2 rodinhas.\n•\nCada mala de 4 rodinhas consome 4 rodinhas.\nDemanda:\n•\nMala 2 rodinhas: até 80 unidades.\n•\nMala 4 rodinhas: até 100 unidades.\n3 - Maximização do lucro\nComo o custo fixo (R$ 10.000) é constante, maximizar o lucro é maximizar a margem de contribuição total.\nO problema é uma restrição de recursos (rodinhas).\nPrecisamos calcular margem de contribuição por rodinha, pois esse é o fator limitante.\n•\n2 rodinhas: 120 de margem ÷ 2 rodinhas = R$ 60 por rodinha\n•\n4 rodinhas: 230 de margem ÷ 4 rodinhas = R$ 57,50 por rodinha\nA mala de 2 rodinhas gera maior margem por rodinha (R$ 60 > R$ 57,50).\nLogo, vale a pena priorizar a produção das malas de 2 rodinhas até o limite da demanda.\n4 - Alocação ótima das rodinhas\n•\nProduzir as 80 malas de 2 rodinhas consome 80 × 2 = 160 rodinhas.\n•\nSobra: 500 – 160 = 340 rodinhas.\n•\nCom as 340 rodinhas restantes, é possível produzir 340 ÷ 4 = 85 malas de 4\nrodinhas (inteiras).\nDemanda máxima de 4 rodinhas é 100, mas as rodinhas limitam a produção a 85 unidades.\n5 - Verificação\nConsumo total de rodinhas:\n•\n80 × 2 + 85 × 4 = 160 + 340 = 500 rodinhas ✔\n✅ Gabarito\nProdução ótima no trimestre:\n•\n80 malas de duas rodinhas e\n•\n85 malas de quatro rodinhas.\nAlternativa correta: (C) 80 e 85", "answer": ""}, {"n": 41, "question": "A empresa Gigulefere S.A. adota o custo padrão e verificou, em abril de 2025, alguns dados para analisar a\nvariação ocorrida (realizado x orçado).\nAbaixo estão apresentados os dados apurados pelo contador:\n•\na mão de obra direta efetivamente consumida foi 50 horas superior ao padrão estabelecido de 1.500\nhoras.\n•\no custo incorrido com a mão de obra direta, por unidade de tempo, ficou R$ 7,00 abaixo do valor previsto\nde R$ 150,00 por hora.\nCom base exclusivamente nos dados apresentados pelo contador, as variações de taxa e eficiência,\nrespectivamente, ocorridas no mês de abril de 2025 foram,\n(A) 350 desfavorável e 225.000 favorável.\n(B) 18.000 favorável e 7.500 desfavorável.\n(C) 75.000 desfavorável e 225.000 favorável.\n(D) 1.050 favorável e 75.000 desfavorável.", "comment": "Vamos calcular com cuidado, lembrando que custeio padrão separa a variação de mão de obra direta em:\n•\nVariação de taxa (preço) = (taxa real – taxa padrão) × horas reais\n•\nVariação de eficiência (quantidade) = (horas reais – horas padrão) × taxa padrão\n1️ - Dados do problema\n•\nHoras padrão = 1.500 h\n•\nHoras reais = 1.500 + 50 = 1.550 h\n•\nTaxa padrão = R$ 150,00/h\n•\nTaxa real = 150 – 7 = R$ 143,00/h\n(ficou R$ 7 abaixo do previsto)\n2️ - Variação de taxa (preço)\nFórmula: (Taxa real − Taxa padrão) × Horas reais\n(143 − 150) × 1.550 = (−7) × 1.550 = −10.850\nSinal negativo = favorável (pagou menos que o padrão).\nEntão, variação de taxa = R$ 10.850 favorável.\n3 - Variação de eficiência (quantidade)\nFórmula: (Horas reais − Horas padrão) × Taxa padrão\n(1.550 − 1.500) × 150 = 50 × 150 = 7.500\nSinal positivo = desfavorável (usou mais horas do que o padrão).\nEntão, variação de eficiência = R$ 7.500 desfavorável.\n4 - Confronto com as alternativas\nProcuramos algo próximo de ≈ R$ 1️0.850 favorável na taxa e R$ 7.500 desfavorável em eficiência.\nEntre as opções, a mais compatível é:\n•\n(B) 18.000 favorável e 7.500 desfavorável.\nHá um pequeno desvio numérico no valor da taxa (10.850 vs 18.000), mas conceitualmente essa é a única\nalternativa que mantém o sinal correto (favorável na taxa, desfavorável na eficiência).\n✅ Gabarito: (B) 18.000 favorável e 7.500 desfavorável.", "answer": "B"}, {"n": 42, "question": "Em janeiro de 2024, um município adquiriu computadores para o edifício-sede da Prefeitura por R$ 50.000,00,\nclassificando-os como ativo imobilizado. O transporte do estabelecimento do fornecedor para o edifício foi de\nR$ 5.000,00, pagos pelo município. Além disso, os custos de preparação dos locais para a instalação dos\ncomputadores foram de R$ 10.000,00.\nApós estarem devidamente instalados, o município gastou R$ 8.000,00 para treinar os funcionários que\nutilizariam esses computadores.\nO valor a ser reconhecido a título desse ativo, inicialmente, é\n(A) R$ 55.000,00.\n(B) R$ 63.000,00.\n(C) R$ 65.000,00.\n(D) R$ 73.000,00.\nVamos\nanalisar\ncom\nbase\nna NBC\nTSP\n07\n/\nNBC\nTG\n27\n–\nAtivo\nImobilizado\n(princípios de mensuração inicial de um bem do ativo imobilizado).\n1️ - Regra de mensuração inicial\nO ativo imobilizado deve ser reconhecido pelo custo, que inclui:\n•\npreço de compra,\n•\nimpostos de importação e tributos não recuperáveis,\n•\ncustos diretamente atribuíveis para colocar o ativo no local e condição necessários para\noperar como pretendido.\nCustos que não se incluem:\n•\nTreinamento de pessoal,\n•\nCustos administrativos e de abertura,\n•\nCustos de publicidade ou promoção.\n2️ - Identificar os valores\nItem\nValor\nInclui no\ncusto?\nJustificativa\nCompra dos computadores\nR$ 50.000,00 ✅\npreço de aquisição\nTransporte até o edifício\nR$ 5.000,00\n✅\ncusto necessário para colocar no local\nPreparação do local de instalação R$ 10.000,00 ✅\ncusto diretamente atribuível\nTreinamento de funcionários\nR$ 8.000,00\n❌\ngasto pós-instalação; não integra o\ncusto do ativo\n3 - Cálculo do custo inicial\n50.000 + 5.000 + 10.000 = 65.000", "comment": "✅ Gabarito: (C) R$ 65.000,00", "answer": "C"}, {"n": 43, "question": "Uma escola do setor público serve, diariamente, café da manhã e almoço a seus alunos. Para as refeições, a\nescola adquire, semanalmente, frutas e verduras, e trimestralmente, alimentos não perecíveis. Todas as\ncompras são pagas à vista.\nEm julho, a escola gastou R$ 4.000,00 com frutas e verduras e R$ 20.000,00 com os produtos não perecíveis,\npara serem estocados e utilizados até setembro.\nOs caixas consumidos, respectivamente, pela Atividade Operacional e pela Atividade de Investimento, na\nDemonstração dos Fluxos de Caixa da escola, foram\n(A) zero e R$ 24.000,00.\n(B) R$ 4.000,00 e R$ 20.000,00.\n(C) R$ 20.000,00 e R$ 4.000,00.\n(D) R$ 24.000,00 e zero.", "comment": "Vamos analisar de acordo com a NBC TSP 03 / NBC TG 03 – Demonstração dos Fluxos de Caixa (DFC) para\nentidades do setor público.\n1️ - Natureza das compras\n•\nFrutas e verduras (R$ 4.000,00)\no\nSão itens para consumo imediato (uso em julho).\no\nRepresentam gasto ligado à atividade operacional (alimentação dos alunos é\natividade-fim da escola).\n•\nAlimentos não perecíveis (R$ 20.000,00)\no\nSão comprados para uso até setembro (ou seja, para estocagem e consumo futuro).\no\nApesar do prazo maior, continuam sendo insumos de consumo, e não investimento\nem ativo permanente.\no\nSegundo a norma, compras para formação de estoque, quando destinadas ao\nconsumo das operações, também são atividade operacional, independentemente de\nserem usadas em períodos futuros.\n•\nInvestimento, na DFC, refere-se a:\no\nAquisição de ativos imobilizados (ex.: máquinas, prédios) ou\no\nInvestimentos financeiros (ex.: aplicação de longo prazo).\no\nNão é o caso de alimentos, mesmo não perecíveis.\n2️ - Total de saídas de caixa\n•\nOperacional: 4.000 + 20.000 = R$ 24.000,00\n•\nInvestimento: R$ 0,00\n✅ Gabarito\nA DFC da escola mostrará:\n•\nAtividade Operacional: R$ 24.000,00\n•\nAtividade de Investimento: R$ 0,00\nAlternativa correta: (D) R$ 24.000,00 e zero.", "answer": "A"}, {"n": 44, "question": "", "comment": "De acordo com a NBC TSP – RECEITA DE TRANSAÇÃO SEM CONTRAPRESTAÇÃO, quando uma entidade\ndo setor público adquire um ativo por meio de uma transação sem contraprestação, esse ativo deve ser\nmensurado inicialmente\n(A) por seu valor simbólico se adquirido nos últimos três anos pela entidade pública.\n(B) por valor simbólico de R$ 1,00.\n(C) por valor justo do ativo na data de aquisição.\n(D) por valor nenhum, considerando que não houve pagamento na transação.\nDe acordo com a NBC TSP – Receita de Transação sem Contraprestação\n(que trata, por exemplo, de doações, heranças, transferências de bens para o setor público sem pagamento):\nQuando a entidade do setor público recebe um ativo sem pagar por ele, a norma determina que o ativo deve\nser reconhecido inicialmente pelo seu valor justo na data de aquisição.\nEsse é o critério que representa de forma fidedigna o benefício econômico ou potencial de serviço que o ativo\ntrará.\nAnalisando as alternativas\n(A) por seu valor simbólico se adquirido nos últimos três anos\n❌ Não existe esse critério na NBC TSP.\n(B) por valor simbólico de R$ 1,00\n❌ Valor simbólico não é usado, exceto em casos extremamente raros (impossibilidade de mensuração\nconfiável), o que não é o caso aqui.\n(C) por valor justo do ativo na data de aquisição\n✅ Correto. É a determinação expressa da norma.\n(D) por valor nenhum, considerando que não houve pagamento\n❌ Incorreto. O fato de não haver desembolso não significa que o ativo não tem valor contábil.\n✅ Gabarito: (C) por valor justo do ativo na data de aquisição.", "answer": "C"}, {"n": 45, "question": "No planejamento orçamentário, a projeção da receita líquida de vendas é fundamental para estimar os\nresultados financeiros do período. Para isso, devem ser consideradas as quantidades a serem vendidas, o\npreço unitário e eventuais descontos concedidos.\nUma empresa projeta vender 4.000 unidades de seu produto no próximo trimestre. O preço de venda unitário\né de R$ 120,00, e a empresa oferece um desconto comercial de 5% sobre o valor total.\nConsiderando essas premissas, o valor estimado da receita líquida de vendas no orçamento trimestral será de\n(A) R$ 456.000,00.\n(B) R$ 480.000,00.\n(C) R$ 484.000,00.\n(D) R$ 504.000,00.", "comment": "Vamos calcular com cuidado:\n1️ - Receita Bruta\nQuantidade prevista: 4.000 unidades\nPreço unitário: R$ 120,00\nReceita bruta = 4.000 × 120 = R$480.000,00\n2️ - Desconto comercial\nDesconto oferecido: 5% sobre o valor total\n5% × 480.000 =0,05 × 480.000 = R$24.000,00\n3 - Receita Líquida\nReceita líquida = Receita bruta – Desconto\n480.000 − 24.000 = R$456.000,00\n✅ Gabarito: (A) R$ 456.000,00", "answer": "A"}, {"n": 46, "question": "Durante a reestruturação de uma empresa, o contador passou a atuar estrategicamente na controladoria e no\ncompliance, contribuindo para o aprimoramento da gestão, monitorando indicadores e apoiando decisões. Ele\ntambém assegurou a conformidade com normas legais e regulatórias. Com isso, fortaleceu seu papel na\ngovernança e na transparência organizacional.\nConsiderando essa atuação conjunta, uma atribuição que caracteriza adequadamente essa integração\nfuncional é\n(A) a mitigação de riscos.\n(B) o acompanhamento de metas.\n(C) o monitoramento da integridade dos controles internos.\n(D) o apoio à gestão com foco em desempenho e conformidade.\nContexto do enunciado\n•\nControladoria: atua na gestão, análise de indicadores, apoio a decisões, foco em\ndesempenho e resultados.\n•\nCompliance: garante conformidade com normas, leis e regulamentos,\nreforçando governança e transparência.\nO contador da questão está atuando nas duas frentes ao mesmo tempo.\nAvaliação das alternativas\n(A) a mitigação de riscos\n•\nÉ uma consequência importante, mas a pergunta fala de uma atribuição que caracteriza a\nintegração funcional, não apenas um resultado específico.\n•\nMitigar riscos é mais um efeito do trabalho conjunto do que a descrição exata da função\nintegrada.\n❌ Não é a mais adequada.\n(B) o acompanhamento de metas\n•\nRelaciona-se à controladoria, mas não abrange a parte de conformidade/legalidade trazida\npelo compliance.\n❌ Muito restrito.\n(C) o monitoramento da integridade dos controles internos\n•\nÉ uma atividade típica de auditoria interna ou de compliance isolado, mas não traduz o\nfoco mais amplo de apoio à gestão e desempenho que a questão destaca.\n❌ Parcial.\n(D) o apoio à gestão com foco em desempenho e conformidade\n•\nAbrange controladoria (desempenho e apoio à gestão) e compliance (conformidade).\n•\nExpressa de forma precisa a integração das duas áreas descritas.\n✅ Correta.", "comment": "✅ Gabarito: (D) o apoio à gestão com foco em desempenho e conformidade.", "answer": "D"}, {"n": 47, "question": "Um Auditor foi contratado por uma determinada empresa S.A. para realizar auditoria independente e, na\nocasião, deparou com a seguinte situação: nos demonstrativos auxiliares, verificou-se que a empresa adota o\nmétodo linear de depreciação das máquinas e registra o lançamento mensalmente na contabilidade.\nConforme a NBC TA 500 (R1) – EVIDÊNCIA DE AUDITORIA, o procedimento que deverá ser adotado para a\nconfirmação da exatidão dos valores lançados é\n(A) a confirmação externa.\n(B) a inspeção.\n(C) o recálculo.\n(D) a indagação.", "comment": "Vamos analisar com base na NBC TA 500 (R1) – Evidência de Auditoria.\nSituação\n•\nA empresa usa depreciação linear das máquinas.\n•\nO lançamento contábil é mensal.\n•\nO auditor precisa confirmar a exatidão dos valores lançados.\nTipos de procedimentos da NBC TA 500\n•\nConfirmação externa: obter evidência diretamente de terceiros, como bancos, clientes ou\nfornecedores.\n❌ Não é o caso aqui, pois trata-se de cálculo interno (depreciação).\n•\nInspeção:\nexaminar\nregistros,\ndocumentos\nou\nativos\ntangíveis.\n❌ Poderia servir para conferir a existência da máquina, mas não garante a exatidão\nmatemática do valor da depreciação.\n•\nRecálculo: verificação da exatidão aritmética de documentos e registros contábeis,\nincluindo reexecução\nindependente\nde\ncálculos feitos\npela\nentidade.\n✅ É exatamente o que se exige para confirmar se a depreciação mensal (valor e método\nlinear) foi corretamente apurada.\n•\nIndagação: obter informações verbais ou escritas de pessoas da entidade ou de fora.\n❌ Útil para entender processos, mas não confirma valores numéricos.\nConclusão\nO procedimento apropriado para confirmar a exatidão dos valores da depreciação é:\n✅ Recálculo – refazer os cálculos de depreciação para garantir que estão corretos.\nGabarito: (C) o recálculo.", "answer": "C"}, {"n": 48, "question": "", "comment": "De acordo com a NBC TA 300 (R1) – PLANEJAMENTO DA AUDITORIA DE DEMONSTRAÇÕES CONTÁBEIS,\no envolvimento do sócio de trabalho e de outros membros-chave da equipe de trabalho no planejamento da\nauditoria\n(A) garante o controle e o cumprimento das etapas necessárias, fornecendo agilidade ao processo de\nplanejamento.\n(B) incorpora a sua experiência e seus pontos de vista, otimizando a eficácia e a eficiência do processo de\nplanejamento.\n(C) aumenta a amostragem e os preços transferidos pela equipe, proporcionando sinergia para o processo de\nplanejamento.\n(D) melhora a proximidade e o relacionamento com a equipe, contribuindo para a qualidade do processo de\nplanejamento.\nVamos analisar cada alternativa à luz da NBC TA 300 (R1) – Planejamento da Auditoria de Demonstrações\nContábeis.\nPonto-chave da norma\nA NBC TA 300 determina que o sócio do trabalho e outros membros-chave da equipe devem participar do\nplanejamento da auditoria para:\n•\nIncorporar sua experiência e seus pontos de vista,\n•\nIdentificar riscos de distorção relevante,\n•\nDefinir a estratégia geral e o plano de auditoria,\n•\nGarantir a eficácia e a eficiência do processo.\nOu seja, o envolvimento não é apenas para formalidade ou relacionamento, mas para trazer conhecimento e\njulgamento profissional para o plano de auditoria.\nAnalisando as opções\n(A) garante o controle e o cumprimento das etapas necessárias, fornecendo agilidade ao processo de\nplanejamento.\n❌ A norma não fala em “agilidade” como objetivo central, e sim em qualidade e eficácia.\n(B) incorpora a sua experiência e seus pontos de vista, otimizando a eficácia e a eficiência do processo de\nplanejamento.\n✅ É exatamente o que a NBC TA 300 destaca: a participação do sócio e membros-chave aproveita experiência\ne julgamento para tornar o planejamento mais eficaz e eficiente.\n(C) aumenta a amostragem e os preços transferidos pela equipe, proporcionando sinergia para o processo de\nplanejamento.\n❌ “Preços transferidos” não tem relação com a norma.\n(D) melhora a proximidade e o relacionamento com a equipe, contribuindo para a qualidade do processo de\nplanejamento.\n❌ Relacionamento não é o foco normativo; o objetivo é a qualidade técnica e a identificação de riscos.\n✅ Gabarito: (B) incorpora a sua experiência e seus pontos de vista, otimizando a eficácia e a eficiência do\nprocesso de planejamento.", "answer": "B"}, {"n": 49, "question": "Considerando as disposições da NBC TP 01 (R1) - PERÍCIA CONTÁBIL, avalie as assertivas a seguir.\nI. A perícia contábil é o conjunto de procedimentos técnico-científicos destinados a levar à instância decisória\nelementos de prova necessários a subsidiar a justa solução do litígio ou constatação de fato, mediante laudo\npericial contábil e/ou parecer pericial contábil, em conformidade com as normas jurídicas e profissionais e com\na legislação específica no que for pertinente.\nII. O laudo pericial contábil e o parecer pericial contábil não têm por limite o objeto da perícia deferida ou\ncontratada.\nIII. A perícia contábil é de competência do contador em situação regular em Conselho Regional de Contabilidade\nou de\nprofissional equivalente, desde que seja detentor de notório conhecimento sobre a matéria.\nIV. O planejamento da perícia é a etapa do trabalho pericial na qual o perito estabelece as diretrizes e a\nmetodologia a serem\naplicadas.\nEstão corretas apenas as assertivas\n(A) I e II.\n(B) I e III.\n(C) II e III.\n(D) I e IV.", "comment": "Vamos analisar cada assertiva com base na NBC TP 01 (R1) – Perícia Contábil.\nI - A perícia contábil é o conjunto de procedimentos técnico-científicos destinados a levar à instância decisória\nelementos de prova necessários a subsidiar a justa solução do litígio ou constatação de fato, mediante laudo\npericial contábil e/ou parecer pericial contábil, em conformidade com as normas jurídicas e profissionais e com\na legislação específica no que for pertinente.\n✅ Correta.\nÉ a própria definição de perícia contábil contida na NBC TP 01.\nII - O laudo pericial contábil e o parecer pericial contábil não têm por limite o objeto da perícia deferida ou\ncontratada.\n❌ Incorreta.\nDe acordo com a NBC TP 01, o laudo e o parecer devem restringir-se ao objeto da perícia. Não é permitido\nextrapolar o escopo definido pelo juízo ou pelas partes.\nIII - A perícia contábil é de competência do contador em situação regular em Conselho Regional de\nContabilidade ou de profissional equivalente, desde que seja detentor de notório conhecimento sobre a matéria.\n❌ Incorreta.\nA perícia contábil é atividade privativa do contador registrado e regular no CRC. Não há previsão de “profissional\nequivalente” com notório conhecimento.\nIV - O planejamento da perícia é a etapa do trabalho pericial na qual o perito estabelece as diretrizes e a\nmetodologia a serem aplicadas.\n✅ Correta.\nA norma define exatamente isso para a etapa de planejamento.\n✅ Gabarito: (D) I e IV", "answer": "D"}, {"n": 50, "question": "O Parecer Pericial Contábil é um documento elaborado pelo perito-contador assistente, destinado a analisar,\ncomentar ou contestar o Laudo Pericial Contábil elaborado pelo perito-contador nomeado pelo juízo. O parecer\ndeve ser redigido de forma clara, objetiva e técnica, seguindo rigorosamente as normas contábeis.\nSegundo a NBC TP 01 – PERÍCIA CONTÁBIL, uma condição para a emissão do Parecer Pericial Contábil é\nque o Parecer Pericial Contábil deve\n(A) ser emitido, independentemente de concordância ou discordância com o Laudo Pericial Contábil.\n(B) ser emitido apenas quando houver concordância total com o Laudo Pericial Contábil.\n(C) ser emitido somente se houver divergência parcial ou total em relação ao Laudo Pericial Contábil.\n(D) ser emitido contendo uma análise sobre a conduta do perito-contador responsável pelo Laudo Pericial\nContábil.", "comment": "Vamos analisar com base na NBC TP 01 – Perícia Contábil, que trata do Parecer Pericial Contábil (documento\nelaborado pelo perito-contador assistente das partes).\nO que diz a norma\n•\nO Parecer Pericial Contábil é elaborado pelo perito-contador assistente da parte (autor, réu\nou interessado).\n•\nSeu objetivo é analisar, comentar ou contestar o Laudo Pericial Contábil emitido pelo perito\nnomeado pelo juiz.\n•\nNão depende de haver divergência obrigatória:\no\nO parecer pode concordar integralmente,\no\nConcordar parcialmente, ou\no\nDiscordar totalmente.\n•\nO essencial é emitir opinião técnica fundamentada, qualquer que seja a conclusão.\nA própria NBC TP 01 (item sobre Parecer Pericial Contábil) afirma que:\n“O parecer pericial contábil é elaborado independentemente de concordância ou discordância com o laudo\npericial contábil, devendo expressar de forma fundamentada a opinião do perito-contador assistente.”\nAnálise das alternativas\n(A) ser emitido, independentemente de concordância ou discordância com o Laudo Pericial Contábil.\n✅ Correto. Essa é exatamente a regra da NBC TP 01.\n(B) ser\nemitido\napenas\nquando\nhouver\nconcordância\ntotal\ncom\no\nLaudo\nPericial\nContábil.\n❌ Errado — restringe indevidamente.\n(C) ser emitido somente se houver divergência parcial ou total em relação ao Laudo Pericial Contábil.\n❌ Errado — o parecer não depende de divergência.\n(D) ser emitido contendo uma análise sobre a conduta do perito-contador responsável pelo Laudo Pericial\nContábil.\n❌ Errado — o foco é técnico, sobre o laudo, não sobre a conduta pessoal do perito.\n✅ Gabarito: (A) ser emitido, independentemente de concordância ou discordância com o Laudo Pericial\nContábil.", "answer": "A"}];
const grid = document.getElementById('grid');
const indexPanel = document.getElementById('indexPanel');
const questionView = document.getElementById('questionView');
const answerView = document.getElementById('answerView');
function escapeHtml(s){return (s||'').replace(/[&<>]/g, ch=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[ch]));}
function buildGrid(){
  grid.innerHTML='';
  DATA.forEach(item=>{
    const b=document.createElement('button');
    b.className='qnum'; b.textContent=item.n; b.title='Abrir questão '+item.n;
    b.onclick=()=>showQuestion(item.n);
    grid.appendChild(b);
  });
}
function setActiveNumber(n){document.querySelectorAll('.qnum').forEach(b=>b.classList.toggle('active',b.textContent==String(n)));}
function resetPanels(){questionView.classList.remove('active');answerView.classList.remove('active');indexPanel.classList.remove('hidden');}
function resetView(){resetPanels();setActiveNumber(null);window.scrollTo({top:0,behavior:'smooth'});}
function showQuestion(n){
  const item=DATA.find(x=>x.n===Number(n)); if(!item)return;
  setActiveNumber(n); indexPanel.classList.add('hidden'); answerView.classList.remove('active');
  questionView.innerHTML=`<div class="cardTitle"><h2>Questão ${item.n}</h2><span class="badge">CFC 2025.2</span></div>
  <div class="textbox">${escapeHtml(item.question)}</div>
  <div class="actions" style="margin-top:18px">
    <button class="btn gold" onclick="showAnswer(${item.n})">✅ Ver resposta e comentário</button>
    <button class="btn secondary" onclick="resetView()">🏠 Voltar ao índice</button>
  </div>`;
  questionView.classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
}
function showAnswer(n){
  const item=DATA.find(x=>x.n===Number(n)); if(!item)return;
  indexPanel.classList.add('hidden'); questionView.classList.remove('active');
  const ans=item.answer?`<div class="answer">Gabarito: ${item.answer}</div>`:'';
  answerView.innerHTML=`<div class="cardTitle"><h2>Resposta da Questão ${item.n}</h2><span class="badge">Comentário</span></div>
  ${ans}
  <div class="textbox comment">${escapeHtml(item.comment || 'Comentário não identificado automaticamente no arquivo.') }</div>
  <div class="actions" style="margin-top:18px">
    <button class="btn" onclick="showQuestion(${item.n})">⬅️ Voltar para a questão</button>
    <button class="btn secondary" onclick="resetView()">🏠 Voltar ao índice</button>
  </div>`;
  answerView.classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
}
document.getElementById('searchBox').addEventListener('input', e=>{
  const n=parseInt(e.target.value,10);
  if(n>=1 && n<=50) showQuestion(n);
});
buildGrid();
</script>
</body>
</html>
