<script>
const DATA = [{"n": 1, "question": "Os dicionários registram os diversos significados de um vocábulo; os dois textos abaixo definem o termo\n“contabilidade”, segundo, respectivamente, os dicionários de Antônio Houaiss (AH) e de Aurélio Buarque de\nHollanda (ABH).\n(AH) Contabilidade: ciência teórica e prática que estuda os métodos de cálculo e registro da movimentação\nfinanceira de uma firma ou empresa.\n(ABH) Contabilidade: ciência que estuda e interpreta os registros dos fenômenos que afetam o patrimônio de\numa entidade (empresa, instituição pública, pessoa física, instituição não lucrativa etc.).\nSobre esses textos, assinale a afirmativa correta.\n(A) As definições começam sempre por uma palavra de conteúdo geral que, nesses casos, é representada pela\npalavra “ciência”.\n(B) Os termos “teórica e prática” e “cálculo e registro” são construídos com palavras antônimas, ou seja, de\nsignificados opostos.\n(C) Os termos entre parênteses da segunda definição mostram todos os tipos de entidades referidas na\ndefinição.\n(D) As duas definições mostram o mesmo objetivo da ciência “contabilidade”.", "comment": "Vamos analisar cada alternativa com cuidado:\nEnunciado das definições:\nAH: “ciência teórica e prática que estuda os métodos de cálculo e registro da movimentação financeira de uma\nfirma ou empresa.”\nABH: “ciência que estuda e interpreta os registros dos fenômenos que afetam o patrimônio de uma entidade\n(empresa, instituição pública, pessoa física, instituição não lucrativa etc.).”\n(A) “As definições começam sempre por uma palavra de conteúdo geral que, nesses casos, é representada\npela palavra ‘ciência’.”\nCorreto. Ambas as definições iniciam exatamente com a palavra “ciência”, que é o termo mais amplo, de caráter\ngeral.\n(B) “Os termos ‘teórica e prática’ e ‘cálculo e registro’ são construídos com palavras antônimas, ou seja, de\nsignificados opostos.”\nIncorreto. “Teórica e prática” são complementares, não opostas. “Cálculo e registro” também não são opostos,\nmas etapas distintas e complementares do processo contábil.\n(C) “Os termos entre parênteses da segunda definição mostram todos os tipos de entidades referidas na\ndefinição.” Incorreto. A expressão “etc.” indica que não se trata de uma lista exaustiva. Portanto, não são\ntodos os tipos.\n(D) “As duas definições mostram o mesmo objetivo da ciência ‘contabilidade’.”\nIncorreto. Embora tratem da mesma ciência, os enfoques são diferentes:\nAH destaca métodos de cálculo e registro da movimentação financeira.\nABH foca na interpretação dos fenômenos que afetam o patrimônio.\n✅ Gabarito: A", "answer": "A"}, {"n": 2, "question": "As frases listadas nas opções a seguir foram reescritas de forma a eliminar-se o “que”, com substituição do\nverbo por um substantivo semanticamente correlato.\nAssinale a frase em que a substituição foi feita de forma adequada.\n(A) Cabral, que descobriu o Brasil, merece homenagens. / Cabral, o criador do Brasil, merece homenagens.\n(B) Caminha, que escreveu a carta, registrou o fato. / Caminha, o redator da carta, registrou o fato.\n(C) As caravelas, que atravessaram o oceano, resistiram a tempestades. / As caravelas, navegadoras do\noceano, resistiram a tempestades.\n(D) A descoberta do Brasil, que ocorreu em 1500, ficou na história. / A descoberta do Brasil, ocorrente em 1500,\nficou na história.", "comment": "Vamos analisar cada alternativa:\n(A) Original: Cabral, que descobriu o Brasil, merece homenagens.\nReescrita: Cabral, o criador do Brasil, merece homenagens.\nProblema: “Criador” não é sinônimo de “descobridor”. Cabral não criou o Brasil, apenas o descobriu.\n❌ Inadequada.\n(B) Original: Caminha, que escreveu a carta, registrou o fato.\nReescrita: Caminha, o redator da carta, registrou o fato.\n“Redator” significa aquele que redige/escreve.\nAqui o sentido é mantido: quem escreveu a carta foi Caminha.\n✅ Adequada.\n(C) Original: As caravelas, que atravessaram o oceano, resistiram a tempestades.\nReescrita: As caravelas, navegadoras do oceano, resistiram a tempestades.\n“Navegadoras” normalmente designa quem navega (pessoas), não o objeto (caravelas).\nA ideia de atravessar o oceano não é bem expressa por “navegadoras”.\n❌ Inadequada.\n(D) Original: A descoberta do Brasil, que ocorreu em 1500, ficou na história.\nReescrita: A descoberta do Brasil, ocorrente em 1500, ficou na história.\n“Ocorrente” soa artificial e não é uso comum da norma culta.\n❌ Inadequada.\n✅ Gabarito: B", "answer": "B"}, {"n": 3, "question": "A empresa Gama S.A. avalia um projeto com investimento inicial de R$ 300.000,00, a ser realizado na data\nzero. Estimam-se entradas de caixa ao final de cada ano, conforme segue:\n•\n1º ano: R$ 121.000,00;\n•\n2º ano: R$ 121.000,00;\n•\n3º ano em diante: R$ 146.410,00 por ano.\nChama-se payback descontado ao tempo necessário para que a soma dos fluxos de caixa descontados iguale\no investimento inicial.\nConsiderando-se uma taxa de desconto de 10% ao ano, o payback do projeto está entre:\n(A) 1 ano e 2 anos.\n(B) 2 anos e 3 anos.\n(C) 3 anos e 4 anos.\n(D) 4 anos e 5 anos.", "comment": "Vamos analisar com bastante cuidado, passo a passo, pois o cálculo é todo numérico.\n1️ - Dados do problema\nInvestimento inicial: R$ 300.000\nTaxa de desconto: 10% ao ano\nFluxos anuais:\nAno 1: R$ 121.000\nAno 2: R$ 121.000\nAno 3: R$ 146.410\n2️ - Fluxos descontados ano a ano\nAno\nFluxo (R$)\nFator de desconto (1,1^ano)\nValor presente (R$)\nAcumulado (R$)\n1\n121.000\n1,1\n121.000 ÷ 1,1 = 110.000\n110.000\n2\n121.000\n1,1² = 1,21\n121.000 ÷ 1,21 = 100.000\n210.000\n3\n146.410\n1️,1️³ ≈ 1️,331️\n1️46.41️0 ÷ 1️,331️ ≈ 110.000\n320.000\n3 - Comparação com o investimento\nApós 1️º ano: ≈1️1️0 mil (não atingiu 300 mil).\nApós 2️º ano: ≈2️1️0 mil (ainda não atingiu).\nDurante o 3º ano: ultrapassa 300 mil.\nOu seja, o valor presente acumulado **atinge o investimento em algum momento entre o 2 º e o 3º ano.\n4 - O QQQ (O Que a Questão Quer)\nA questão pede:\n“o payback do projeto está entre …”\nComo o ponto de equilíbrio ocorre depois do 2º ano, mas antes do 3º ano terminar, o intervalo é entre 2 anos e\n3 anos.\n✅ Gabarito correto: (B) entre 2 anos e 3 anos", "answer": "B"}, {"n": 4, "question": "A empresa VGF S.A. tomou um empréstimo bancário de R$ 14.560,00 para financiar a compra de\nequipamentos. O contrato de empréstimo estabelece que o valor tomado deve ser liquidado por meio de uma\nsérie postecipada de 3 pagamentos mensais, iguais e sucessivos. O regime de capitalização adotado é o de\njuros compostos, à taxa de 20% ao mês.\nConsiderando essas informações, é correto afirmar que o valor das prestações mensais será de:\n(A) R$ 4.853,33.\n(B) R$ 6.400,00.\n(C) R$ 6.912,00.\n(D) R$ 7.280,00.", "comment": "Vamos calcular passo a passo:\n1) O que estamos calculando\nÉ uma série postecipada: três parcelas iguais, pagas no fim de cada mês. Queremos achar o valor da parcela\n(PMT) tal que o valor presente desses três pagamentos, descontados a 20% a.m., seja exatamente R$\n14.560,00.\n2) A fórmula certa (anuidade postecipada)\nPMT = PV × 1 − (1+i)−n\nPV = 14.560 (valor presente do empréstimo)\ni = 0,20 ao mês (20%)\nn = 3 meses\nPor que essa fórmula?\nPorque ela “inverte” a soma dos três pagamentos trazidos a valor presente. Em vez de somar parcela por\nparcela descontando, usamos um fator de anuidade.\n3) Substituindo os valores\nPMT= 14.560 × 0,20 / 1 − (1,20)−3\n4) Resolva o denominador com calma\n(1,20)3 = 1,728 / (1,20)3 = 1,728\n(1,20)−3 = 1 / 1,728 ≈ 0,5787037\n1 − 0,5787037 ≈ 0,42129631\n5) Faça a fração da taxa\n0,20 / 0,4212963 ≈ 0,474\n6) Encontre a parcela\nPMT = 14.560 × 0,474 ≈ R$ 6.91️2️,00\n7) Checagem rápida (sempre bom!)\nSe a parcela é 6.912, o PV deve bater 14.560:\n6.912 / 1,201 + 6.912 / 1,202 + 6.912/1,203\n= 5.760 + 4.800 + 4.000 = 14.560\n✅ Gabarito: (C) R$ 6.912,00", "answer": "C"}, {"n": 5, "question": "Para o contador que atua no setor público ou na fiscalização de contratos administrativos, o conhecimento da\nLei nº 14.133, de 1º de abril de 2021 (Lei de Licitações e Contratos), é fundamental para a avaliação da\nlegalidade e conformidade dos gastos públicos.\nO Art. 5º dessa Lei elenca diversos princípios que devem guiar a atuação das Administrações Públicas diretas,\nautárquicas e fundacionais da União, dos Estados, do Distrito Federal e dos Municípios.\nCom base no texto legal, avalie os seguintes princípios:\nI. Impessoalidade;\nII. Transparência;\nIII. Racionalidade econômica;\nIV. Probidade administrativa.\nEstão expressamente listados no Art. 5º da Lei os princípios:\n(A) I e IV, apenas.\n(B) II, apenas.\n(C) I, II e IV, apenas.\n(D) I, II, III e IV.", "comment": "Vamos analisar o que diz o art. 5º da Lei nº 14.133/2021 (Nova Lei de Licitações e Contratos):\nArt. 5º — Na aplicação desta Lei serão observados os princípios da legalidade, da impessoalidade, da\nmoralidade, da publicidade, da eficiência, da segregação de funções, da motivação, da vinculação ao edital, do\njulgamento objetivo, da segurança jurídica, da razoabilidade, da competitividade, da proporcionalidade, da\nceleridade, da economicidade, da transparência, da eficácia e do interesse público…\nCom base nesse artigo, vejamos cada item da questão:\nI. Impessoalidade   Está no art. 5º.\nII. Transparência   Está no art. 5º.\nIII. Racionalidade econômica ❌ Não está no art. 5º.\nO que aparece é economicidade, não “racionalidade econômica”.\nIV. Probidade administrativa   Está no art. 5º.\n(Equivale a moralidade e probidade administrativa, expressamente previstas.)\nConclusão\nEstão expressamente listados I, II e IV apenas.\n✅ Gabarito: (C)", "answer": "C"}, {"n": 6, "question": "Um estudante de contabilidade, ao iniciar seus estudos em Direito Tributário, depara-se com o conceito\nfundamental de tributo. Para uma compreensão precisa, ele busca a definição legal contida no Código Tributário\nNacional (Lei nº 5.172/1966).", "comment": "De acordo com esse diploma legal, assinale a opção que define corretamente o tributo.\n(A) Tributo é toda prestação pecuniária voluntária, em moeda ou cujo valor nela se possa exprimir, que não\nconstitua sanção de ato ilícito, instituída por meio de medida provisória e cobrada mediante atividade\nadministrativa com alguma discricionariedade.\n(B) Tributo é toda sanção de ato ilícito, cobrada compulsoriamente em bens ou serviços, instituída em lei e\naplicada com base em decisões discricionárias da administração pública.\n(C) Tributo é toda prestação pecuniária compulsória, em bens ou cujo valor nela se possa exprimir, que não\nconstitua sanção de ato ilícito, instituída por qualquer ato normativo e cobrada mediante atividade administrativa\nparcialmente vinculada.\n(D) Tributo é toda prestação pecuniária compulsória, em moeda ou cujo valor nela se possa exprimir, que não\nconstitua sanção de ato ilícito, instituída em lei e cobrada mediante atividade administrativa plenamente\nvinculada.\nVamos direto à base legal.\nO artigo 3º do Código Tributário Nacional (Lei 5.172/1966) define:\n“Tributo é toda prestação pecuniária compulsória, em moeda ou cujo valor nela se possa exprimir, que não\nconstitua sanção de ato ilícito, instituída em lei e cobrada mediante atividade administrativa plenamente\nvinculada.”\nAgora, vamos conferir cada alternativa:\n(A) Diz “prestação pecuniária voluntária” → errado, pois é compulsória.\nFala em “instituída por medida provisória” → errado, o CTN exige lei.\n“atividade administrativa com alguma discricionariedade” → errado, é plenamente vinculada.\n❌ Incorreta\n(B) “Sanção de ato ilícito” → errado, tributo não é sanção.\n“cobrada compulsoriamente em bens ou serviços” → errado, é em moeda ou valor expresso em moeda.\n❌ Incorreta\n(C) “em bens ou cujo valor nela se possa exprimir” → errado, é em moeda ou cujo valor nela se possa exprimir.\n“instituída por qualquer ato normativo” → errado, tem que ser lei.\n“atividade administrativa parcialmente vinculada” → errado, é plenamente vinculada.\n❌ Incorreta\n(D)“prestação pecuniária compulsória” → certo.\n“em moeda ou cujo valor nela se possa exprimir” → certo.\n“que não constitua sanção de ato ilícito” → certo.\n“instituída em lei” → certo.\n“cobrada mediante atividade administrativa plenamente vinculada” → certo.\n✅ Correta\nGabarito: (D)", "answer": "D"}, {"n": 7, "question": "", "comment": "De acordo com a Lei Complementar no 123, de 14 de dezembro de 2006, que institui o Estatuto Nacional da\nMicroempresa e da Empresa de Pequeno Porte, os limites de receita bruta anual para fins de enquadramento\nsão informações essenciais para a atuação do contador.\nConsiderando o que a lei estabelece sobre a definição de Microempresa (ME) e Empresa de Pequeno Porte\n(EPP), assinale a afirmativa correta.\n(A) Uma Microempresa (ME) aufere, em cada ano-calendário, receita bruta igual ou inferior a R$ 120.000,00, e\numa Empresa de Pequeno Porte (EPP) aufere receita bruta superior a R$ 120.000,00 e igual ou inferior a R$\n1.200.000,00.\n(B) Uma Microempresa (ME) aufere, em cada ano-calendário, receita bruta igual ou inferior a R$ 360.000,00, e\numa Empresa de Pequeno Porte (EPP) aufere receita bruta superior a R$ 360.000,00 e igual ou inferior a R$\n4.800.000,00.\n(C) Uma Microempresa (ME) aufere, em cada ano-calendário, receita bruta igual ou inferior a R$ 81.000,00, e\numa Empresa de Pequeno Porte (EPP) aufere receita bruta superior a R$ 81.000,00 e igual ou inferior a R$\n4.800.000,00.\n(D) Os limites de receita bruta para ME e EPP são fixados anualmente por decreto do Comitê Gestor do Simples\nNacional.\nVamos analisar com base na Lei Complementar nº 123/2006 (Estatuto Nacional da Microempresa e da\nEmpresa de Pequeno Porte), já atualizada pelos limites em vigor.\nLimites de receita bruta anual segundo a LC 123/2006\n- Microempresa (ME)\nReceita bruta anual igual ou inferior a R$ 360.000,00.\n- Empresa de Pequeno Porte (EPP)\nReceita bruta anual superior a R$ 360.000,00 e igual ou inferior a R$ 4.800.000,00.\nEsses são os valores atualmente aplicáveis, após as atualizações feitas pela LC 155/2016, em vigor desde\n2018.\nAnalisando as alternativas\n(A) Limite de R$ 120.000,00 e EPP até R$ 1.200.000,00.\n❌ Desatualizado. Esses eram limites antigos (antes de 2006 e das alterações posteriores).\n(B) ME até R$ 360.000,00 e EPP de R$ 360.000,00 até R$ 4.800.000,00.\n✅ Correto. É exatamente o que estabelece a LC 123 em vigor.\n(C) ME até R$ 81.000,00 e EPP até R$ 4.800.000,00.\n❌ O limite de R$ 81.000,00 refere-se ao MEI (Microempreendedor Individual), não à ME.\n(D) Limites fixados anualmente por decreto do Comitê Gestor do Simples Nacional.\n❌ Incorreto. Os limites são definidos em lei complementar, não por decreto.\n✅ Gabarito: (B) Uma Microempresa (ME) aufere, em cada ano-calendário, receita bruta igual ou inferior a R$\n360.000,00, e uma Empresa de Pequeno Porte (EPP) aufere receita bruta superior a R$ 360.000,00 e igual\nou inferior a R$ 4.800.000,00.", "answer": "B"}, {"n": 8, "question": "Um escritório contábil quer expandir sua clientela com campanha de marketing, mas tem dúvidas sobre\npublicidade e preços conforme o Código de Ética.\nCom base na NBC PG 01 – CÓDIGO DE ÉTICA PROFISSIONAL DO CONTADOR, uma prática de divulgação\ne precificação eticamente correta é:\n(A) Prometer redução garantida de tributos sem embasamento técnico.\n(B) Comparar preços e criticar concorrentes.\n(C) Divulgar clientes e faturamento sem autorização.\n(D) Expor conhecimento técnico com artigos e estudos de caso.", "comment": "De acordo com a NBC PG 01 – Código de Ética Profissional do Contador, o profissional deve pautar sua atuação\npela dignidade, independência e competência, e pode divulgar seus serviços desde que com caráter\ninformativo, educativo e científico, sem autopromoção enganosa, sem promessas de resultados e sem\ndesqualificar outros profissionais.\nAnalisando as opções:\n(A) Prometer redução garantida de tributos sem embasamento técnico\n❌ Vedado – configura propaganda enganosa e promessa de resultado certo, o que a norma proíbe.\n(B) Comparar preços e criticar concorrentes\n❌ Vedado – a norma veda comparação depreciativa ou crítica de colegas para obter clientela.\n(C) Divulgar clientes e faturamento sem autorização\n❌ Vedado – depende de consentimento expresso; divulgar sem autorização viola sigilo profissional.\n(D) Expor conhecimento técnico com artigos e estudos de caso\n✅ Permitido – a norma autoriza e incentiva divulgação com fins educativos ou científicos, como artigos,\npalestras, estudos de caso e participação em eventos.\n✅ Gabarito: (D) Expor conhecimento técnico com artigos e estudos de caso.", "answer": "D"}, {"n": 9, "question": "Durante uma reunião com a diretoria de uma empresa cliente, o contador responsável apresentou os impactos\nfinanceiros de um novo contrato. Embora os dados estivessem tecnicamente corretos, os gestores\ndemonstraram dúvidas e certa dificuldade em compreender a apresentação.\nNesse cenário, a habilidade profissional que contribuiria para que o contador fosse mais eficaz, de acordo com\na NBC PG 100 (R1) – CUMPRIMENTO DO CÓDIGO, DOS PRINCÍPIOS FUNDAMENTAIS E DA ESTRUTURA\nCONCEITUAL, seria:\n(A) Realizar escuta ativa.\n(B) Demonstrar clareza na exposição de dados.\n(C) Revisar a legislação aplicável.\n(D) Ignorar as dúvidas do cliente.", "comment": "De acordo com a NBC PG 100 (R1), que trata do cumprimento do Código, dos princípios fundamentais e da\nestrutura conceitual, o contador deve comunicar-se de forma clara e eficaz para garantir que as informações\ncontábeis sejam compreendidas por quem as utiliza.\nAnalisando as opções:\n(A) Realizar escuta ativa\nEscuta ativa é importante, mas o problema descrito não foi falta de escuta, e sim dificuldade de entendimento\nda apresentação.\n(B) Demonstrar clareza na exposição de dados\nPerfeito. O caso relata que os dados eram corretos, porém de difícil compreensão. A habilidade de clareza na\ncomunicação é exatamente a recomendada pela NBC PG 100 (R1) para que o contador seja eficaz.\n(C) Revisar a legislação aplicável\nA legislação estava correta; o obstáculo não foi técnico, e sim de comunicação.\n(D) Ignorar as dúvidas do cliente\nVai contra a ética e a boa prática profissional.\n✅ Gabarito: (B) Demonstrar clareza na exposição de dados.", "answer": "B"}, {"n": 10, "question": "", "comment": "De acordo com a NBC TG ESTRUTURA CONCEITUAL – ESTRUTURA CONCEITUAL PARA RELATÓRIO\nFINANCEIRO, as características qualitativas fundamentais são relevância e representação fidedigna, sendo\nque, para ser representação fidedigna, a representação deve ser completa, neutra e isenta de erros.\nUma informação neutra pode:\n(A) Ser parcial.\n(B) Ser prudente.\n(C) Possuir inclinações.\n(D) Ser tendenciosa na seleção de informações financeiras.\nDe acordo com a NBC TG Estrutura Conceitual – Estrutura Conceitual para Relatório Financeiro, para que a\nrepresentação seja fidedigna ela precisa ser:\nCompleta, Neutra, e Isenta de erro.\nA norma explica que neutralidade significa ausência de viés, ou seja, a informação não pode ser manipulada\nou direcionada para favorecer determinado resultado ou influenciar indevidamente a tomada de decisão.\nIsso não significa ausência de prudência na elaboração, mas sim não ser tendenciosa nem parcial.\nVamos analisar as alternativas:\n(A) Ser parcial – ❌ Parcial é o oposto de neutro.\n(B) Ser prudente – ✅ Prudência é compatível com neutralidade, pois não implica distorção ou favorecimento.\n(C) Possuir inclinações – ❌ Inclinação é viés.\n(D) Ser tendenciosa na seleção de informações financeiras – ❌ Tendenciosa é o oposto de neutra.\n✅ Gabarito: (B) Ser prudente.", "answer": "B"}, {"n": 11, "question": "", "comment": "De acordo com a NBC TG ESTRUTURA CONCEITUAL – ESTRUTURA CONCEITUAL PARA RELATÓRIO\nFINANCEIRO, para ajudar os usuários das demonstrações contábeis a identificar e avaliar mudanças e\ntendências, as demonstrações contábeis:\n(A) São elaboradas com base na forma jurídica, em detrimento da essência das transações.\n(B) Restringem a utilização de estimativas a casos em que poderão haver perdas financeiras do usuário.\n(C) Incluem, apenas, informações que podem ser compreendidas, também, por usuários com pouco\nconhecimento das atividades comerciais e econômicas, sem auxílio de consultores.\n(D) Fornecem informações comparativas de, pelo menos, um período de relatório anterior.\nDe acordo com a NBC TG – Estrutura Conceitual para Relatório Financeiro, um dos requisitos para que as\ndemonstrações contábeis sejam úteis é permitir que os usuários identifiquem e avaliem mudanças e tendências.\nPara isso, a norma estabelece a característica qualitativa de comparabilidade, que inclui a exigência de\ninformações comparativas:\n“Para atender à comparabilidade, as demonstrações contábeis devem incluir informações comparativas com\nrelação ao período anterior.”\nAgora, vamos analisar as alternativas:\n(A) “São elaboradas com base na forma jurídica, em detrimento da essência das transações.”\n❌ Incorreto – A Estrutura Conceitual exige exatamente o oposto: prevalência da essência sobre a forma.\n(B) “Restringem a utilização de estimativas a casos em que poderão haver perdas financeiras do usuário.”\n❌ Incorreto – Estimativas são parte normal e necessária da contabilidade, não se restringindo a perdas.\n(C) “Incluem, apenas, informações que podem ser compreendidas, também, por usuários com pouco\nconhecimento…”\n❌ Incorreto – A norma parte do pressuposto de usuários com conhecimento razoável, que podem, se\nnecessário, buscar auxílio de consultores.\n(D)“Fornecem informações comparativas de, pelo menos, um período de relatório anterior.”\n✅ Correto – Está exatamente de acordo com a exigência de comparabilidade.\n✅ Gabarito: (D) Fornecem informações comparativas de, pelo menos, um período de relatório anterior.", "answer": "D"}, {"n": 12, "question": "Uma sociedade empresária presta serviços de perícia a terceiros.\nEm junho de 2024, aconteceram os seguintes fatos:\n•\nCompra de material de escritório para pagamento em 60 dias: R$ 5.000,00;\n•\nRecebimento antecipado pelos serviços que serão prestados no segundo semestre: R$ 10.000,00;\n•\nReconhecimento do salário de seus empregados, para pagamento em 5 de julho: R$ 12.000,00.\nEm junho de 2024, o passivo da sociedade empresária aumentou em:\n(A) R$ 15.000,00.\n(B) R$ 17.000,00.\n(C) R$ 22.000,00.\n(D) R$ 27.000,00.", "comment": "Vamos analisar fato por fato, considerando que o passivo é a obrigação presente de pagar:\n1️ - Compra de material de escritório a prazo (R$ 5.000,00)\nPagamento em 60 dias → gera obrigação (fornecedores).\nAumenta o passivo em R$ 5.000,00.\n2️ - Recebimento antecipado de serviços (R$ 10.000,00)\nO serviço ainda não foi prestado.\nO valor recebido é receita antecipada, que é um passivo (obrigação de prestar o serviço ou devolver o valor).\nAumenta o passivo em R$ 10.000,00.\n3 - Reconhecimento do salário a pagar (R$ 12.000,00)\nSalários reconhecidos em junho para pagar em 5 de julho → obrigação trabalhista.\nAumenta o passivo em R$ 12.000,00.\nTotal do aumento do passivo em junho/2024\n5.000 + 10.000 + 12.000 = 27.000\n✅ Gabarito: (D) R$ 27.000,00", "answer": "D"}, {"n": 13, "question": "", "comment": "De acordo com a NBC TG ESTRUTURA CONCEITUAL - ESTRUTURA CONCEITUAL PARA RELATÓRIO\nFINANCEIRO, com relação às implicações das características qualitativas para a escolha da base de\nmensuração, avalie as afirmativas a seguir e assinale (V) para a verdadeira e (F) para a falsa.\n( ) Utilizar consistentemente as mesmas bases de mensuração para os mesmos itens, seja de período a\nperíodo, na entidade que reporta ou em um único período para diferentes entidades, prejudica a\ncomparabilidade das demonstrações.\n( ) A mudança na base de mensuração pode tornar as demonstrações contábeis menos compreensíveis.\nContudo, a mudança pode ser justificada se outros fatores compensarem a redução na compreensibilidade, por\nexemplo, se a mudança resulta em informações mais relevantes.\n( )A verificação é melhorada utilizando-se bases de mensuração que resultam em avaliações que podem ser\nindependentemente corroboradas diretamente, por exemplo, observando os preços, ou indiretamente, por\nexemplo, verificando dados de entrada de modelo.\nAs afirmativas são, respectivamente,\n(A) V – V – V.\n(B) V – V – F.\n(C) V – F – V.\n(D) F – V – V\nVamos analisar com base na NBC TG – Estrutura Conceitual para Relatório Financeiro:\n1ª afirmativa\nUtilizar consistentemente as mesmas bases de mensuração para os mesmos itens, de período a período ou\nentre entidades, prejudica a comparabilidade.\nA norma destaca que usar consistentemente as mesmas bases de mensuração aumenta a comparabilidade,\npois permite comparar períodos e entidades de forma adequada.\nDizer que prejudica está em desacordo com o texto.\nClassificação: ❌ Falsa\n2ª afirmativa\nA mudança na base de mensuração pode tornar as demonstrações contábeis menos compreensíveis, mas\npode ser justificada se resultar em informações mais relevantes.\nCorreto. A Estrutura Conceitual reconhece que a compreensibilidade pode ser reduzida com a mudança, porém\naceita a mudança se ela gerar informações mais relevantes ou representar melhor a realidade.\nClassificação: ✅ Verdadeira\n3ª afirmativa\nA verificação é melhorada utilizando-se bases de mensuração que resultem em avaliações que podem ser\ncorroboradas diretamente (observando preços) ou indiretamente (verificando dados de modelo).\nExatamente o que a norma entende por verificabilidade: confirmação direta ou indireta das informações.\nClassificação: ✅ Verdadeira\nSequência final\nF – V – V\n✅ Gabarito: (D)", "answer": "D"}, {"n": 14, "question": "", "comment": "A NBC TG 28 (R4) - PROPRIEDADES PARA INVESTIMENTO trata de definição, classificação e mensuração\nde propriedades para investimento.\nSobre esse item, analise as seguintes afirmativas:\nI. Propriedade para Investimento é classificada dentro do subgrupo investimento no ativo circulante.\nII. Propriedade para investimento é um terreno, edifício ou veículo mantido pela entidade para auferir aluguel\nou valorização do capital.\nIII. Propriedade para investimento no momento da aquisição deve ser mensurada pelo seu custo. Está correto\no que se afirma em\n(A) II e III, apenas.\n(B) III, apenas.\n(C) I, II e III.\n(D) II, apenas.\nVamos analisar cada uma das três afirmativas com base na NBC TG 28 (R4) – Propriedades para Investimento\n(CPC 28):\nI - Propriedade para investimento é classificada dentro do subgrupo investimento no ativo circulante.\n❌ Errado. A norma estabelece que propriedades para investimento são apresentadas no ativo não circulante,\nno subgrupo Investimentos (ou em alguns casos no Imobilizado, quando aplicável), e não no ativo circulante.\nAtivo circulante destina-se a bens e direitos realizáveis em até 12 meses.\nII - Propriedade para investimento é um terreno, edifício ou veículo mantido pela entidade para auferir aluguel\nou valorização do capital.\n❌ Errado. A definição correta é: terrenos ou edifícios (ou parte deles) mantidos para obter aluguel ou para\nvalorização de capital.\nVeículos não se enquadram como propriedade para investimento.\nA inclusão de “veículo” torna a afirmativa incorreta.\nIII - Propriedade para investimento, no momento da aquisição, deve ser mensurada pelo seu custo.\n✅ Correto. A NBC TG 28 determina que a mensuração inicial é feita pelo custo, incluindo custos de transação.\nConclusão\nSomente a afirmativa III está correta.\n✅ Gabarito: (B) III, apenas.", "answer": "B"}, {"n": 15, "question": "Um ativo individual ou um grupo de ativos mantido para venda são ativos a ser alienados, por venda ou de\noutra forma, em conjunto como um grupo de ativos em uma só transação, e passivos diretamente associados\na esses ativos que serão transferidos na transação.", "comment": "De acordo com a NBC TG 31 (R4) – ATIVO NÃO CIRCULANTE MANTIDO PARA VENDA E OPERAÇÃO\nDESCONTINUADA, a depreciação do ativo ou grupo de ativos mantidos para venda deve:\n(A) Ser parcial, pois o ativo ou grupo de ativos ainda está operando.\n(B) Ser mantida até a venda ser concretizada.\n(C) Ser interrompida quando o ativo ou grupo de ativos for reclassificado como mantido para venda.\n(D) Continuar como estava antes da reclassificação.\nDe acordo com a NBC TG 31 (R4) – Ativo Não Circulante Mantido para Venda e Operação Descontinuada,\nquando um ativo (ou grupo de ativos) é classificado como mantido para venda, ele deixa de ser usado com o\nobjetivo de gerar benefícios econômicos pela operação normal.\nA norma estabelece que:\n“Uma entidade não deve depreciar um ativo não circulante enquanto ele estiver classificado como mantido para\nvenda.”\nIsso porque a mensuração passa a ser pelo menor valor entre o valor contábil e o valor justo líquido de despesas\nde venda, e não mais pela sistemática de depreciação usual.\nAnalisando as alternativas:\n(A) ser parcial – ❌ Não existe depreciação parcial prevista.\n(B) ser mantida até a venda – ❌ Contraria a norma.\n(C) ser interrompida quando o ativo ou grupo de ativos for reclassificado como mantido para venda – ✅\nExatamente o que a NBC TG 31 determina.\n(D) continuar como estava antes da reclassificação – ❌ Contraria a norma.\n✅ Gabarito: (C) ser interrompida quando o ativo ou grupo de ativos for reclassificado como mantido para\nvenda.", "answer": "C"}, {"n": 16, "question": "", "comment": "De acordo com a NBC TG 01 (R4) - REDUÇÃO AO VALOR RECUPERÁVEL DE ATIVOS, o valor em uso é o\nvalor presente de fluxos de caixa futuros esperados que devem advir de um ativo ou de unidade geradora de\ncaixa.\nAvalie se os seguintes elementos devem ser refletidos no cálculo do valor em uso do ativo:\nI. O valor pago na aquisição do ativo.\nII. As expectativas acerca de possíveis variações no montante ou no período de ocorrência desses fluxos de\ncaixa futuros.\nIII. As estimativas dos fluxos de caixa futuros que a entidade espera obter com esse ativo. IV. O valor do dinheiro\nno tempo, representado pela atual taxa de juros livre de risco. Estão corretos os elementos\n(A) I, II e III, apenas.\n(B) I e II, apenas.\n(C) III e IV, apenas.\n(D) II, III e IV, apenas.\nVamos analisar cada item com base na NBC TG 01 (R4) – Redução ao Valor Recuperável de Ativos.\nConceito central\nO valor em uso é definido como:\n“o valor presente dos fluxos de caixa futuros esperados que devem advir de um ativo ou unidade geradora de\ncaixa, descontados a uma taxa apropriada.”\nPara calculá-lo, é necessário:\n•\nEstimativas de fluxos de caixa futuros,\n•\nExpectativas de variações no montante ou no momento desses fluxos,\n•\nValor do dinheiro no tempo (taxa de desconto apropriada).\nAnálise das assertivas\nI. O valor pago na aquisição do ativo\n❌ Não é incluído. O valor em uso não considera o custo histórico. Ele é baseado nos fluxos de caixa futuros,\nnão no valor que foi pago no passado.\nII. As expectativas acerca de possíveis variações no montante ou no período de ocorrência desses fluxos de\ncaixa futuros\n✅ Sim. A norma exige considerar expectativas de variação nos fluxos ou no momento em que eles ocorrerão.\nIII. As estimativas dos fluxos de caixa futuros que a entidade espera obter com esse ativo\n✅ Sim. É a base fundamental do cálculo do valor em uso.\nIV. O valor do dinheiro no tempo, representado pela atual taxa de juros livre de risco\n✅ Sim. O desconto a valor presente reflete o valor do dinheiro no tempo e o risco específico do ativo.\nConclusão\nCorretos: II, III e IV apenas.\n✅ Gabarito: (D) II, III e IV, apenas.", "answer": "D"}, {"n": 17, "question": "O ágio por expectativa de rentabilidade futura (goodwill) reconhecido em uma combinação de negócios é um\nativo que representa benefícios econômicos futuros advindos de outros ativos adquiridos na combinação de\nnegócios que não são identificados individualmente e não são reconhecidos separadamente.", "comment": "De acordo com a NBC TG 04 (R4) – ATIVO INTANGÍVEL e com a NBC TG 15 (R4) – COMBINAÇÃO DE\nNEGÓCIOS, a empresa adquirente deve reconhecer, na data da aquisição, separadamente do ágio derivado\nda expectativa de rentabilidade futura (goodwill) apurado em uma combinação de negócios, um ativo intangível\nadquirido, independentemente de o ativo ter sido reconhecido pela adquirida antes da aquisição da empresa.\nA perda por desvalorização reconhecida para o ágio por expectativa de rentabilidade futura (goodwill) não deve\nser revertida em período subsequente, pois:\n(A) Não pode ser amortizada.\n(B) No plano de contas não há rubrica apropriada.\n(C) Gera fluxos de caixa, independentemente de outros ativos ou grupos de ativos.\n(D) É equivalente ao goodwill gerado internamente.\nVamos analisar com base nas normas:\nNormas envolvidas\nNBC TG 15 (R4) – Combinação de Negócios\nNBC TG 04 (R4) – Ativo Intangível\nNBC TG 01 (R4) – Redução ao Valor Recuperável de Ativos (Impairment)\nO goodwill (ágio por expectativa de rentabilidade futura):\nNão é amortizado sistematicamente.\nDeve ser testado anualmente para impairment (teste de recuperabilidade).\nSe houver perda (desvalorização), essa perda não pode ser revertida em exercícios seguintes.\nPor que não pode ser revertida?\nA NBC TG 01 (R4) explica:\n“Uma perda por desvalorização reconhecida para o ágio por expectativa de rentabilidade futura não deve ser\nrevertida em período subsequente. Isso ocorre porque qualquer aumento subsequente no valor recuperável do\nágio é, na realidade, um ágio gerado internamente, o qual não é reconhecido como ativo segundo as normas\ncontábeis.”\nAnalisando as alternativas\n(A) Não pode ser amortizada. É verdade que goodwill não é amortizado, mas isso não é a razão para proibir a\nreversão da perda. ❌\n(B) No plano de contas não há rubrica apropriada. Nada a ver com o motivo da norma. ❌\n(C) Gera fluxos de caixa, independentemente de outros ativos ou grupos de ativos. Pelo contrário: o goodwill\nnão gera fluxos de caixa de forma independente; é sempre vinculado a uma unidade geradora de caixa. ❌\n(D) É equivalente ao goodwill gerado internamente. ✅ Correto: qualquer aumento posterior no valor\nrecuperável é considerado ágio gerado internamente, que não pode ser reconhecido.\n✅ Gabarito: (D) É equivalente ao goodwill gerado internamente.", "answer": "D"}, {"n": 18, "question": "A Demonstração do Valor Adicionado (DVA) busca evidenciar o valor e a distribuição da riqueza econômica\ngerada pelas atividades da sociedade empresária, incluindo também o valor adicionado recebido em\ntransferência.\nA riqueza gerada é evidenciada na distribuição entre o capital (Remuneração de capital próprio e de terceiros),\ntrabalho (Pessoal) e governo (Impostos, taxas e contribuições).\nRelacione cada item a seguir ao respectivo componente da distribuição da riqueza, conforme disposto na NBC\nTG 09 (R1) – DEMONSTRAÇÃO DO VALOR ADICIONADO.\n( ) Fundo de Garantia por Tempo de Serviços (FGTS)\n( ) Aluguéis pagos\n( ) Dividendos distribuídos\n( ) Contribuição Social sobre o Lucro Líquido (CSLL)\n1. Pessoal\n2. Impostos, taxas e contribuições\n3. Remuneração de capital de terceiros\n4. Remuneração de capital próprio\nA relação correta, na ordem apresentada, é:\n(A) 1 – 2 – 3 – 4.\n(B) 2 – 3 – 4 – 1.\n(C) 2 – 4 – 3 – 1.\n(D) 1 – 3 – 4 – 2.", "comment": "Vamos analisar cada item conforme a NBC TG 09 (R1) – Demonstração do Valor Adicionado (DVA):\n1️ - Fundo de Garantia por Tempo de Serviços (FGTS)\nFaz parte da remuneração de pessoal, pois é encargo trabalhista obrigatório vinculado ao salário.\nClassificação: Pessoal → (1️)\n2️ - Aluguéis pagos\nSão pagamentos feitos a terceiros pela utilização de bens (imóveis, equipamentos etc.), caracterizando\nremuneração de capital de terceiros.\nClassificação: Remuneração de capital de terceiros → (3)\n3 - Dividendos distribuídos\nRepresentam a remuneração dos proprietários do capital (sócios ou acionistas).\nClassificação: Remuneração de capital próprio → (4)\n4 - Contribuição Social sobre o Lucro Líquido (CSLL)\nTributo incidente sobre o lucro.\nClassificação: Impostos, taxas e contribuições → (2️)\nOrdem pedida na questão\nFGTS → 1️\nAluguéis pagos → 3\nDividendos distribuídos → 4\nCSLL → 2️\n✅ Gabarito: (D) 1 – 3 – 4 – 2", "answer": "D"}, {"n": 19, "question": "A empresa Delta S.A. adquiriu uma máquina por R$ 350.000,00 em 01/01/2020. No momento da aquisição, a\nadministração de Delta S.A. estimou a vida útil desse ativo em 10 anos e um valor residual de R$ 50.000,00. A\nmáquina estava disponível para uso em 01/01/2020 e a empresa adotou o método de depreciação linear.\nEm 31/12/2023, a empresa procedeu a uma revisão das suas estimativas, conforme previsto no NBC TG 27\n(R4) – ATIVO IMOBILIZADO, e constatou as seguintes informações:\n•\nVida útil remanescente: 9 anos;\n•\nValor residual: R$ 50.000,00.\nCom base exclusivamente nas informações apresentadas, o valor da depreciação anual dessa máquina a partir\nde 01/01/2024 será de\n(A) R$ 35.000,00.\n(B) R$ 30.000,00.\n(C) R$ 20.000,00.\n(D) R$ 15.000,00.", "comment": "Vamos calcular com cuidado, seguindo as normas da NBC TG 27 (R4) – Ativo Imobilizado.\n1️ - Dados de aquisição e estimativas originais\nCusto de aquisição: R$ 350.000\nVida útil inicial: 10 anos\nValor residual: R$ 50.000\nMétodo de depreciação: linear\nDepreciação anual original:\n350.000 − 50.000 / 10 = 300.000 / 10 = 30.000 por ano\n2️ - Depreciação acumulada até 31/12/2023\nDe 01/01/2020 a 31/12/2023 = 4 anos\n4 × 30.000 = 120.000\n3 - Valor contábil em 31/12/2023\n350.000 − 120.000 = 230.000\n4 - Novas estimativas a partir de 01/01/2024\nVida útil remanescente: 9 anos\nValor residual: R$ 50.000\nA norma exige que, quando mudam as estimativas, não se ajusta retroativamente, mas se deprecia o valor\ncontábil líquido com base nas novas estimativas.\nNova depreciação anual = Valor contábil em 31/12/2023 – Valor residual\n230.000 − 50.0009 = 180.000 / 9 = 20.000\n✅ Resultado\nA partir de 01/01/2024, a depreciação anual da máquina será de R$ 20.000,00.\nGabarito: (C) R$ 20.000,00", "answer": "C"}, {"n": 20, "question": "", "comment": "A NBC TG ESTRUTURA CONCEITUAL estabelece os conceitos dos elementos das demonstrações contábeis.\nA NBC TG ESTRUTURA CONCEITUAL estabelece os conceitos dos elementos das demonstrações contábeis.\nCom base nessa norma, avalie as afirmativas a seguir e assinale (V) para a verdadeira e (F) para a falsa.\n( ) Ativo é um recurso econômico presente de propriedade da entidade como resultado de eventos passados.\n( ) Passivo é uma obrigação futura da entidade de transferir um recurso econômico como resultado de eventos\npassados.\n( )Receitas são aumentos nos ativos, ou reduções nos passivos, que resultam em aumento no patrimônio\nlíquido, exceto\naqueles referentes a contribuições de detentores de direitos sobre o patrimônio.\n( ) Despesas são reduções nos ativos, ou aumentos nos passivos, que resultam em reduções no patrimônio\nlíquido, exceto aqueles referentes a distribuições aos detentores de direitos sobre o patrimônio.\nAs afirmativas são, respectivamente,\n(A) F – F – V – V.\n(B) F – V – F – V.\n(C) V – F – V – F.\n(D) V – V – F – F.\n1ª afirmativa\nAtivo é um recurso econômico presente de propriedade da entidade como resultado de eventos passados.\nProblema: a norma não exige “propriedade”, e sim controle.\nA definição correta é: “Ativo é um recurso econômico presente controlado pela entidade como resultado de\neventos passados.” Portanto, ao dizer “de propriedade”, a frase está errada.\nClassificação: ❌ Falsa\n2ª afirmativa\nPassivo é uma obrigação futura da entidade de transferir um recurso econômico como resultado de eventos\npassados.\nProblema: a obrigação é presente, não futura.\nA definição correta é: “Passivo é uma obrigação presente da entidade de transferir um recurso econômico como\nresultado de eventos passados.”\nClassificação: ❌ Falsa\n3ª afirmativa\nReceitas são aumentos nos ativos, ou reduções nos passivos, que resultam em aumento no patrimônio líquido,\nexceto aqueles referentes a contribuições de detentores de direitos sobre o patrimônio.\nPerfeito. Essa é exatamente a redação prevista na Estrutura Conceitual.\nClassificação: ✅ Verdadeira\n4ª afirmativa\nDespesas são reduções nos ativos, ou aumentos nos passivos, que resultam em reduções no patrimônio\nlíquido, exceto aqueles referentes a distribuições aos detentores de direitos sobre o patrimônio.\nPerfeito. Também corresponde exatamente ao conceito da norma.\nClassificação: ✅ Verdadeira\nSequência final\n✅ Gabarito: (A) F – F – V – V", "answer": "A"}, {"n": 21, "question": "A empresa Alfa S.A. adquiriu, por R$ 1.300.000,00, no dia 01/01/2025, 80% do capital da empresa Beta S.A.,\nadquirindo nessa data o seu controle.\nNa data da aquisição:\n1. o valor contábil do patrimônio líquido da empresa Beta S.A. era de R$ 1.000.000,00;\n2. o valor líquido dos ativos identificáveis e dos passivos da empresa Beta S.A. correspondentes a 100%\nde seu capital social, mensurados a valor justo, era de R$ 1.500.000,00.\nCom base exclusivamente nos dados apresentados e na NBC TG 15 (R4) – COMBINAÇÃO DE NEGÓCIOS,\navalie as afirmativas com relação à contabilização ocorrida na empresa Alfa S.A.:\nI. Foi registrado um goodwill no valor de R$ 100.000,00.\nII. Foi registrada uma compra vantajosa no valor de R$ 200.000,00.\nIII. Foi registrado um ágio ou mais-valia dos ativos no valor de R$ 400.000,00.\nIV. Foi registrado um ágio ou mais-valia dos ativos no valor de R$ 500.000,00.\nEstão corretas as afirmativas\n(A) I e III, apenas.\n(B) I e IV, apenas.\n(C) II e III, apenas.\n(D) II e IV, apenas.", "comment": "Vamos reavaliar com muita atenção.\nOs dados do enunciado são:\nPreço pago por 80%: R$ 1.300.000\nPatrimônio líquido contábil (100%): R$ 1.000.000\nAtivos líquidos a valor justo (100%): R$ 1.500.000\n1️ - Goodwill (ágio por expectativa de rentabilidade futura)\nFórmula básica segundo a NBC TG 15:\nGoodwill = Preço pago – Valor justo da participação adquirida\nParticipação adquirida (80%) em valor justo = 1.500.000 × 80% = 1.200.000\nPreço pago = 1.300.000\nGoodwill = 1.300.000 – 1.200.000 = 100.000\n✔ Afirmativa I correta.\n2️ - Mais-valia (ágio em ativos identificáveis)\nMais-valia é a diferença entre o valor justo dos ativos líquidos e seu valor contábil.\nDiferença = 1.500.000 – 1.000.000 = 500.000 (100%)\nComo a Alfa adquiriu 80%, a parte que ela efetivamente reconhece como mais-valia é:\n500.000 × 80% = 400.000\nEssa é uma interpretação importante:\nSe a pergunta se refere ao ajuste de mais-valia reconhecido pela investidora (sobre a fração adquirida), então\no valor correto é 400.000, e não 500.000.\n✔ Afirmativa III correta se olharmos para a parte proporcional de 80%.\n3 - Compra vantajosa\nNão houve compra vantajosa, pois o preço pago foi maior que o valor justo da participação adquirida.\n❌ Afirmativa II incorreta.\nAssim, se a banca considerou que a mais-valia deve ser apresentada apenas na proporção adquirida (80%), o\ngabarito A (I e III, apenas) é consistente.", "answer": "A"}, {"n": 22, "question": "Influência significativa é o poder de participar das decisões sobre políticas financeiras e operacionais de uma\ninvestida, mas sem que haja o controle individual ou o conjunto dessas políticas.", "comment": "A NBC TG 18 (R4) – INVESTIMENTO EM COLIGADA determina que a existência de influência significativa por\ninvestidor geralmente é evidenciada por uma ou mais das seguintes formas, à exceção de uma. Assinale-a.\n(A) Indicação de funcionários para a investida.\n(B) Operações materiais entre o investidor e a investida.\n(C) Intercâmbio de diretores ou gerentes.\n(D) Fornecimento de informação técnica essencial.\nA NBC TG 18 (R4) – Investimento em Coligada define influência significativa como o poder de participar das\ndecisões sobre as políticas financeiras e operacionais da investida, sem controlá-la.\nA norma cita como evidências comuns da existência de influência significativa, entre outras:\nRepresentação no conselho de administração ou equivalente;\nParticipação nos processos de elaboração de políticas, incluindo decisões sobre dividendos;\nOperações materiais entre as partes;\nIntercâmbio de diretores ou gerentes;\nFornecimento de informação técnica essencial.\nAnalisando cada alternativa:\n(A) Indicação de funcionários para a investida\nA norma não menciona a simples indicação de funcionários como evidência de influência significativa.\nDiferente de participação no conselho ou intercâmbio de diretores, indicar empregados de nível comum não\ngarante influência sobre políticas financeiras ou operacionais.\n❌ É a exceção.\n(B) Operações materiais entre o investidor e a investida\n✔ Previsto expressamente.\n(C) Intercâmbio de diretores ou gerentes\n✔ Previsto expressamente.\n(D) Fornecimento de informação técnica essencial\n✔ Previsto expressamente.\n✅ Gabarito: (A) Indicação de funcionários para a investida.", "answer": "A"}, {"n": 23, "question": "A empresa ABCDE possui os seguintes registros referentes às movimentações em determinado período:\n•\nCompras:.............................................. R$ 5.000,00.\n•\nEstoque inicial:...................................... R$ 3.000,00.\n•\nVendas: ...............................................R$ 12.000,00.\n•\nEstoque final: ........................................R$ 2.000,00.\n•\nDevoluções de compras: ..........................R$ 500,00.\nCom base nesses registros, é possível afirmar que a empresa obteve o Custo das Mercadorias Vendidas (CMV)\nde\n(A) R$ 6.000,00.\n(B) R$ 7.500,00.\n(C) R$ 8.000,00.\n(D) R$ 5.500,00.", "comment": "Vamos calcular o Custo das Mercadorias Vendidas (CMV) usando a fórmula do inventário periódico:\nCMV = Estoque Inicial + Compras Líquidas − Estoque Final\n1️ - Compras líquidas\nCompras = R$ 5.000,00\nDevoluções de compras = R$ 500,00\nCompras líquidas = 5.000 – 500 = R$ 4.500,00\n2️ - Aplicando a fórmula\nEstoque inicial = R$ 3.000,00\nEstoque final = R$ 2.000,00\nCMV = 3.000 + 4.500 – 2.000\nCMV = R$ 5.500,00\n3 - Conferência\nVendas (R$ 12.000,00) não entram diretamente no cálculo do CMV, apenas servem para apurar a margem\nbruta depois.\n✅ Gabarito: (D) R$ 5.500,00", "answer": "D"}, {"n": 24, "question": "A empresa S.A. possuía, em 31/12/2024, obrigações presentes como resultados de eventos passados, cuja\nsaída de recursos envolvendo benefícios futuros na liquidação esteve sujeita à análise, com a classificação\ndisposta na tabela a seguir:\nTipo de Obrigação\nValor\nda\nmensuração\npor\nestimativa confiável\nProbabilidade de ocorrência de\nsaída de recurso\nGarantia de venda\nR$ 5.000,00\nProvável\nTerreno contaminado e obrigação\nnão formalizada\nR$ 15.000,00\nProvável\nProcesso Trabalhista I\nR$ 10.000,00\nRemota\nProcesso Trabalhista II\nR$ 20.000,00\nPossível\nProcesso Fiscal\nHá impossibilidade de estimar\nconfiavelmente no momento\nPossível\nCom base nos dados, segundo a NBC TG 25 (R2) – PROVISÕES, PASSIVOS CONTINGENTES E ATIVOS\nCONTINGENTES, o montante a ser reconhecido como provisões no Balanço Patrimonial da empresa deve ser\nde\n(A) R$ 20.000,00.\n(B) R$ 40.000,00.\n(C) R$ 30.000,00.\n(D) R$ 50.000,00.", "comment": "Vamos resolver passo a passo:\nA NBC TG 25 (R2) – Provisões, Passivos Contingentes e Ativos Contingentes determina que uma provisão só\ndeve ser reconhecida quando se verificarem, simultaneamente, três condições:\nObrigação presente resultante de evento passado (essa obrigação pode ser legal ou mesmo não formalizada,\ndesde que a prática da empresa crie expectativa de cumprimento).\nProbabilidade de saída de recursos para liquidar a obrigação seja provável.\nValor possa ser estimado com confiabilidade.\nCom esse critério em mente, analisemos cada item informado pela empresa:\nGarantia de venda – Valor estimado de R$ 5.000,00, com probabilidade provável.\nAtende a todos os requisitos: há obrigação presente, a saída de recursos é provável e existe mensuração\nconfiável. Deve ser reconhecida como provisão.\nTerreno contaminado e obrigação não formalizada – Valor estimado de R$ 15.000,00, com probabilidade\nprovável. A norma admite obrigações não formalizadas quando a empresa, por sua conduta, cria expectativa\nde que irá arcar com a obrigação. Como também há mensuração confiável, deve ser reconhecida como\nprovisão.\nProcesso Trabalhista I – Valor estimado de R$ 10.000,00, com probabilidade remota.\nQuando a chance de perda é remota, não se reconhece provisão nem se exige divulgação.\nNão deve ser registrada.\nProcesso Trabalhista II – Valor estimado de R$ 20.000,00, com probabilidade possível.\nPara casos apenas possíveis, a norma manda apenas divulgar em notas explicativas, não reconhecer provisão.\nNão deve ser registrada.\nProcesso Fiscal – Probabilidade possível, e além disso não é possível mensurar com confiabilidade.\nFalham os requisitos de probabilidade e mensuração.\nNão deve ser registrada.\nSomando apenas os valores que efetivamente se qualificam para provisão (Garantia de venda R$ 5.000,00 +\nTerreno contaminado R$ 15.000,00), obtém-se: Total a reconhecer como provisão: R$ 20.000,00.\nPortanto, segundo a NBC TG 25 (R2), o montante que deve ser reconhecido no Balanço Patrimonial da empresa\ncomo provisões é R$ 20.000,00.\n✅ Gabarito: (A) R$ 20.000,00", "answer": "A"}, {"n": 25, "question": "A empresa Serviços S.A. encerrou seu exercício em 31/12/2024, deixando de efetuar o lançamento referente à\nreceita de serviços prestados a um cliente em dezembro e ainda não recebidos, deixando de obedecer, assim,\nao regime de competência.\nComo consequência do erro cometido pela ausência desse registro,\n(A) o saldo da conta clientes ficou superavaliado.\n(B) o saldo do disponível ficou subavaliado.\n(C) a receita do exercício ficou superavaliada.\n(D) o lucro do exercício ficou subavaliado.", "comment": "Vamos analisar com base no regime de competência:\nFato: A empresa prestou serviços em dezembro de 2024, mas não registrou a receita porque o cliente ainda\nnão pagou.\nRegime de competência:\nO correto seria reconhecer a receita no momento da prestação do serviço, independentemente do recebimento.\nO lançamento correto seria Débito em Clientes (ativo) e Crédito em Receita de Serviços (resultado).\nO que aconteceu:\nComo não houve lançamento, tanto a receita quanto o lucro do exercício ficaram menores do que deveriam.\nO saldo de Clientes (ativo a receber) também ficou menor, não maior.\nO saldo de Disponível (caixa/bancos) não é afetado, pois ainda não houve recebimento.\nAnalisando as alternativas\n(A) o saldo da conta clientes ficou superavaliado\n❌ Errado. Ficou subavaliado, pois não foi registrado o direito a receber.\n(B) o saldo do disponível ficou subavaliado\n❌ Errado. O disponível (caixa/bancos) não mudaria, já que não houve recebimento.\n(C) a receita do exercício ficou superavaliada\n❌ Errado. Ficou subavaliada, pois deixou de reconhecer receita.\n(D) o lucro do exercício ficou subavaliado\n✅ Correto. Se a receita ficou menor, o lucro também ficou menor.\nGabarito: (D) o lucro do exercício ficou subavaliado.", "answer": "D"}, {"n": 26, "question": "A Cia. Gold vende pulseiras.\nEm 31/12/2024, não havia estoque inicial de pulseiras.\nNo primeiro trimestre de 2025 aconteceram os seguintes fatos:\n•\n05/01: compra de 20 pulseiras por R$ 10.000,00;\n•\n25/01: venda de 10 pulseiras por R$ 1.200,00 cada;\n•\n05/02: compra de 12 pulseiras por R$ 7.200,00;\n•\n20/02: venda de 11 pulseiras por R$ 1.300,00 cada;\n•\n05/03: compra de 8 pulseiras por R$ 5.200,00;\n•\n20/03: venda de 15 pulseiras por R$ 1.400,00 cada.\nAssinale a opção que indica o valor aproximado do estoque final de pulseiras da Cia. Gold em 31/03/2025,\nconsiderando que a empresa utiliza o método do Custo Médio Ponderado Móvel com base diária:\n(A) R$ 7.840,00.\n(B) R$ 8.326,00.\n(C) R$ 9.100,00.\n(D) R$ 10.905,00.", "comment": "Vamos detalhar o cálculo do estoque final pelo Custo Médio Ponderado Móvel:\n1️ - Compra em 05/01\n•\n20 pulseiras por R$ 10.000\n•\nCusto médio = 10.000 ÷ 20 = R$ 500,00/unidade\n2️ - Venda em 25/01\n•\nVenda: 10 pulseiras\n•\nSaída: 10 × 500 = R$ 5.000\n•\nSaldo: 10 pulseiras – custo total R$ 5.000\n•\nCusto médio = R$ 500,00/unidade\n3 - Compra em 05/02\n•\nCompra: 12 pulseiras por R$ 7.200\n•\nNovo saldo: 10 + 12 = 22 pulseiras\n•\nNovo custo total: 5.000 + 7.200 = R$ 12.200\n•\nNovo custo médio: 1️2️.2️00 ÷ 2️2️ ≈ R$ 554,55/unidade\n4 - Venda em 20/02\n•\nVenda: 11 pulseiras\n•\nSaída: 1️1️ × 554,55 ≈ R$ 6.100\n•\nSaldo: 22 – 11 = 11 pulseiras\n•\nCusto total ≈ R$ 6.100\n•\nCusto médio permanece ≈ R$ 554,55/unidade\n5 - Compra em 10/03\n•\nCompra: 8 pulseiras por R$ 5.200\n•\nNovo saldo: 11 + 8 = 19 pulseiras\n•\nNovo custo total: 6.100 + 5.200 = R$ 11.300\n•\nNovo custo médio: 1️1️.300 ÷ 1️9 ≈ R$ 594,74/unidade\n6 - Venda em 27/03\n•\nVenda: 5 pulseiras\n•\nSaída: 5 × 594,74 ≈ R$ 2.973,70\n•\nSaldo final: 19 – 5 = 14 pulseiras\n•\nCusto total final ≈ R$ 8.326,30\n✅ Resultado\nO estoque final da Cia. Gold em 31/03/2025 é de aproximadamente R$ 8.326,00.\nGabarito: (B) R$ 8.326,00", "answer": "B"}, {"n": 27, "question": "Uma loja de cosméticos começou a funcionar em 01/07/2024. No segundo semestre de 2024, aconteceram os\nseguintes fatos:\n•\nIntegralização de capital social em dinheiro: R$ 300.000,00;\n•\nCompra à vista de móveis e utensílios para a loja: R$ 40.000,00;\n•\nCompra à vista de estoque para revenda: R$ 80.000,00;\n•\nPagamento do aluguel do semestre: R$ 30.000,00;\n•\nPagamento antecipado do aluguel do primeiro trimestre de 2025: R$ 18.000,00;\n•\nVenda de todo o estoque por R$ 400.000,00, sendo que metade do valor já foi recebido e o restante\ndeverá ser recebido no primeiro semestre de 2025. A loja estima inadimplência de 5%;\n•\nReconhecimento e pagamento de despesas diversas: R$ 12.000,00;\n•\nReconhecimento de despesa de depreciação: R$ 4.000,00.\nO fluxo de caixa gerado pela atividade operacional em 2024, de acordo com as diretrizes da NBC TG 03 (R3)\n– DEMONSTRAÇÃO DOS FLUXOS DE CAIXA foi de\n(A) R$ 20.000,00.\n(B) R$ 75.000,00.\n(C) R$ 60.000,00.\n(D) R$ 360.000,00.", "comment": "Vamos calcular com cuidado o caixa gerado pelas atividades operacionais em 2024, conforme a NBC TG 03\n(R3) – Demonstração dos Fluxos de Caixa.\n1️ - Identificar atividades\nInvestimento (não entram no operacional):\nCompra de móveis e utensílios: R$ 40.000,00 → Atividade de investimento.\nFinanciamento (não entram no operacional):\nIntegralização de capital social: R$ 300.000,00 → Atividade de financiamento.\nOu seja, essas duas ficam fora do cálculo do fluxo operacional.\n2️ - Recebimentos de caixa operacionais\nVenda de mercadorias: total R$ 400.000,00\nRecebido à vista: 50% = R$ 200.000,00\n50% será recebido em 2️02️5 → não entra em 2024.\nA provisão de 5% de inadimplência é um ajuste contábil, não afeta o caixa de 2024.\nTotal de entradas operacionais em 2024: R$ 200.000,00\n3 - Pagamentos operacionais em 2024\nCompra de estoque para revenda: R$ 80.000,00\nPagamento do aluguel do semestre (competência de 2024): R$ 30.000,00\nPagamento antecipado do aluguel do 1º trimestre de 2025: R$ 18.000,00\nEmbora seja despesa de 2025, o pagamento saiu do caixa em 2024. No fluxo de caixa pelo método direto,\né saída operacional porque é pagamento a fornecedor/locador.\nDespesas diversas (reconhecidas e pagas): R$ 12.000,00\nDepreciação: R$ 4.000,00 → não afeta caixa.\nTotal de saídas operacionais em 2024:\n80.000 + 30.000 + 18.000 + 12.000 = R$ 140.000,00\n4 - Fluxo de caixa líquido das operações\n200.000  (entradas) − 140.000  (saídas) = 60.000 / 200.000 (entradas) − 140.000 (saídas) = 60.000\n✅ Resultado\nO fluxo de caixa gerado pelas atividades operacionais em 2024 foi de R$ 60.000,00.\nGabarito: (C) R$ 60.000,00", "answer": "C"}, {"n": 28, "question": "Em 01/12/2024, uma sociedade empresária apresentava, em seu Balanço Patrimonial, como ativo imobilizado,\num terreno, cujo valor contábil era de R$ 80.000,00.\nEm 31/12/2024, a sociedade empresária realizou um teste de recuperabilidade em seus ativos imobilizados.\nFoi constatado que o valor em uso do terreno era de R$ 75.000,00.\nPara que não haja reconhecimento de perda de recuperabilidade do terreno, o valor justo líquido de despesa\nde venda deve ser\n(A) menor do que R$ 75.000,00.\n(B) maior do que R$ 79.999,99.\n(C) entre R$ 72.000,00 e R$ 74.999,99.\n(D) entre R$ 75.000,00 e R$ 79.999,99.", "comment": "Vamos analisar com base na NBC TG 01 (R4) – Redução ao Valor Recuperável de Ativos (Impairment).\n1️ - Conceito\nValor recuperável = maior entre:\nValor em uso (valor presente dos fluxos de caixa futuros esperados), e\nValor justo líquido de despesa de venda.\nSó se reconhece perda se o valor contábil for maior que o valor recuperável.\n2️ - Dados do problema\n•\nValor contábil do terreno: R$ 80.000,00\n•\nValor em uso: R$ 75.000,00\n•\nValor justo líquido de despesa de venda: ? (a descobrir)\n3 - Condição para não haver perda\nPara não haver perda:\nValor recuperaˊvel≥Valor contaˊbilValor recuperaˊvel≥Valor contaˊbil\nE sabemos que:\nValor recuperável é o maior entre o Valor em uso e o Valor justo líquido de vendas\nComo o valor em uso é R$ 75.000,00, menor que o valor contábil, a única forma de evitar perda é que o valor\njusto líquido de despesa de venda seja maior ou igual a R$ 80.000,00.\n4 - Alternativas\n•\n(A) menor do que R$ 75.000,00 → ❌ insuficiente.\n•\n(B) maior do que R$ 79.999,99 → ✅ é o que garante valor recuperável ≥ R$ 80.000,00.\n•\n(C) entre R$ 72.000,00 e R$ 74.999,99 → ❌ insuficiente.\n•\n(D) entre R$ 75.000,00 e R$ 79.999,99 → ❌ ainda abaixo do contábil.\n✅ Gabarito: (B) maior do que R$ 79.999,99", "answer": "B"}, {"n": 29, "question": "Em junho de 2025, uma companhia aérea reconheceu as seguintes receitas:\n•\ncom a marcação de assentos: R$ 150.000,00;\n•\ncom equivalência patrimonial: R$ 200.000,00;\n•\ncom a venda de passagens: R$ 900.000,00.\nNesse mês, a companhia aérea reconheceu como Receita, na primeira linha da Demonstração do Resultado\ndo Exercício, o seguinte montante:\n(A) R$ 900.000,00.\n(B) R$ 1.050.000,00.\n(C) R$ 1.100.000,00.\n(D) R$ 1.250.000,00.", "comment": "Vamos analisar cuidadosamente, com base na NBC TG 30 / CPC 47 – Receita de Contrato com Cliente e na\nforma de apresentação da Demonstração do Resultado do Exercício (DRE).\n1️ - Receita com venda de passagens – R$ 900.000\nReceita principal da atividade operacional.\nEntra integralmente na primeira linha da DRE.\n2️ - Receita com marcação de assentos – R$ 150.000\nServiço acessório diretamente relacionado ao transporte de passageiros.\nTambém é considerada receita de prestação de serviços da atividade principal.\nDeve ser somada à receita de passagens na primeira linha.\n3 - Resultado de equivalência patrimonial – R$ 200.000\nProveniente de participação em investimentos (coligadas ou controladas).\nSegundo a NBC TG 18 – Investimento em Coligada e em Controlada, esse resultado\n“deve ser apresentado em linha própria na DRE, não compondo a receita de vendas ou de serviços.”\nPortanto, não integra a primeira linha.\n4 - Total de receita a apresentar na primeira linha da DRE\n900.000 + 150.000 = 1.050.000\n✅ Gabarito\nA receita a ser reconhecida na primeira linha da DRE é R$ 1.050.000,00.\nAlternativa correta: (B) R$ 1.050.000,00.", "answer": "A"}, {"n": 30, "question": "Em 01/01/2025, uma livraria tinha em estoque 20 livros “Estatística Simples”. Cada livro tinha sido adquirido\npor R$ 80,00 e era vendido por R$ 140,00.\nNo primeiro trimestre desse ano, a movimentação do livro foi a seguinte:\n•\n28/01: venda de 10 livros por R$ 140,00.\n•\n05/02: compra de 15 livros por R$ 90,00.\n•\n25/02: venda de 18 livros por R$ 150,00.\n•\n05/03: compra de 20 livros por R$ 95,00.\n•\n28/03: venda de 25 livros por R$ 150,00.\nO custo das mercadorias vendidas no primeiro trimestre de 2025, considerando que a livraria utiliza o método\nPEPS para avaliação de estoque, foi de\n(A) R$ 3.860,00.\n(B) R$ 4.220,00.\n(C) R$ 4.660,00.\n(D) R$ 5.035,00.", "comment": "Vamos fazer o cálculo detalhado pelo método PEPS (FIFO) com os valores corretos.\nEstoque inicial\n20 livros × R$ 80 = R$ 1.600\n1️ - Venda em 28/01 – 10 livros\nSai do lote mais antigo: 10 × 80 = R$ 800\nEstoque: 10 × 80 = R$ 800\n2️ - Compra em 05/02 – 15 livros a R$ 90\nEstoque:\n10 × 80 = R$ 800\n15 × 90 = R$ 1.350\n3 - Venda em 25/02 – 18 livros\nPrimeiro 10 × 80 = R$ 800\nDepois 8 × 90 = R$ 720\nTotal da venda = R$ 1.520\nEstoque restante: 7 × 90 = R$ 630\n4 - Compra em 05/03 – 20 livros a R$ 95\nEstoque:\n7 × 90 = R$ 630\n20 × 95 = R$ 1.900\n5 - Venda em 28/03 – 25 livros\nPrimeiro 7 × 90 = R$ 630\nDepois 18 × 95 = R$ 1.710\nTotal da venda = R$ 2.340\nEstoque final: 2 × 95 = R$ 190\n6 - Custo das Mercadorias Vendidas (CMV) do trimestre\n800 + 1.520 + 2.340 = 4.660\n✅ Resultado\nO CMV no primeiro trimestre de 2025, pelo método PEPS, é R$ 4.660,00.\nGabarito: (C) R$ 4.660,00.", "answer": "C"}, {"n": 31, "question": "A compreensão dos conceitos e métodos relacionados à Demonstração do Resultado do Exercício (DRE) e à\nDemonstração do Resultado Abrangente (DRA) é fundamental para a adequada análise das variações do\npatrimônio líquido e para a tomada de decisões baseadas nos resultados operacionais.\nA respeito do tema, analise as seguintes afirmativas:\nI. A recompra de ações de emissão da própria entidade para manutenção em tesouraria afeta o resultado\nabrangente por representar diminuição do patrimônio líquido.\nII. O resultado abrangente compreende todos os componentes da demonstração do resultado e dos outros\nresultados abrangentes.\nIII. Pelo método da natureza da despesa, as despesas são classificadas conforme sua função, como\nadministrativas, comerciais e de produção, facilitando a análise dos custos dos produtos vendidos.\nIV. A informação sobre a natureza das despesas é útil para prever os fluxos de caixa futuros e requer divulgação\nadicional quando a classificação adotada na DRE for baseada no método da função das despesas.\nV. A entidade deve apresentar rubricas ou itens de receitas ou despesas como itens extraordinários, quer na\ndemonstração do resultado abrangente, quer na demonstração do resultado do período, quer nas notas\nexplicativas.", "comment": "De acordo com a NBC TG 26 (R5) – APRESENTAÇÃO DAS DEMONSTRAÇÕES CONTÁBEIS, estão corretas\nas afirmativas\n(A) II e IV, apenas.\n(B) I, III e V, apenas.\n(C) II, III e IV, apenas.\n(D) I, II, IV e V, apenas.\nVamos analisar cada afirmativa com base na NBC TG 26 (R5) – Apresentação das Demonstrações Contábeis:\nI. A recompra de ações de emissão da própria entidade para manutenção em tesouraria afeta o resultado\nabrangente por representar diminuição do patrimônio líquido.\nA recompra de ações (ações em tesouraria) reduz o patrimônio líquido, mas não transita pelo resultado\nabrangente.\nEla é registrada diretamente no patrimônio líquido, em conta de ações em tesouraria, sem passar pela DRE\nnem pela DRA.\nClassificação: ❌ Falsa\nII. O resultado abrangente compreende todos os componentes da demonstração do resultado e dos outros\nresultados abrangentes.\nCorreto. O resultado abrangente inclui:\no resultado do período (DRE) e\noutros resultados abrangentes (variações patrimoniais que não transitam pela DRE, como ajustes de avaliação\npatrimonial, ganhos ou perdas atuariais etc.).\nClassificação: ✅ Verdadeira\nIII.Pelo método da natureza da despesa, as despesas são classificadas conforme sua função, como\nadministrativas, comerciais e de produção, facilitando a análise dos custos dos produtos vendidos.\nO método da natureza da despesa classifica as despesas de acordo com a natureza dos gastos (salários,\nenergia, depreciação), independentemente da função.\nQuem classifica por função (administrativas, comerciais, custo de produtos vendidos) é o método da função da\ndespesa.\nClassificação: ❌ Falsa\nIV.A informação sobre a natureza das despesas é útil para prever os fluxos de caixa futuros e requer divulgação\nadicional quando a classificação adotada na DRE for baseada no método da função das despesas.\nCorreto. Se a entidade adotar a apresentação por função, a norma exige que forneça informações adicionais\nsobre a natureza das despesas, pois isso ajuda a prever fluxos de caixa.\nClassificação: ✅ Verdadeira\nV. A entidade deve apresentar rubricas ou itens de receitas ou despesas como itens extraordinários, quer na\ndemonstração do resultado abrangente, quer na demonstração do resultado do período, quer nas notas\nexplicativas.\nA NBC TG 2️6 proíbe a apresentação de itens como “extraordinários”, seja na DRE, na DRA ou nas notas.\nA norma é clara:\n“Não se deve apresentar quaisquer itens de receita ou despesa como itens extraordinários.”\nClassificação: ❌ Falsa\n✅ Gabarito: (A) II e IV, apenas.", "answer": "A"}, {"n": 32, "question": "A empresa S.A. é especializada na construção de galpões industriais sob encomenda de acordo com\nespecificações exclusivas de cada cliente. Os contratos firmados pela empresa preveem que a construção\nocorra no terreno do cliente, com pagamentos mensais vinculados ao andamento da obra, que pode durar de\n6 a 10 meses.\nConsiderando as informações apresentadas e os preceitos da NBC TG 47 – RECEITA DE CONTRATO COM\nCLIENTE, o reconhecimento da receita deve ocorrer\n(A) somente após a emissão do certificado de aceitação técnica da obra pelo cliente.\n(B) no momento da conclusão da obra, quando todos os riscos e benefícios são transferidos.\n(C) no início do contrato, pois o pagamento mensal caracteriza o reconhecimento da receita.\n(D) ao longo do tempo, pois o desempenho da entidade cria ou melhora ativo que o cliente controlará à medida\nque é construído.", "comment": "Vamos analisar de acordo com a NBC TG 47 – Receita de Contrato com Cliente (equivalente ao CPC 47 / IFRS\n15).\nSituação descrita\nConstrução sob encomenda, em terreno do cliente.\nPagamentos mensais proporcionais ao andamento da obra.\nObra com duração de 6 a 10 meses.\nRegras da NBC TG 47\nA receita é reconhecida ao longo do tempo se ocorrer pelo menos uma das condições abaixo (item 35 da\nnorma):\nO cliente recebe e consome os benefícios à medida que a entidade executa.\n(ex.: serviços de limpeza)\nA execução cria ou melhora um ativo que o cliente controla à medida que é construído.\n✅ É exatamente o caso, pois o galpão é erguido no terreno do cliente e o cliente tem controle do ativo em\nconstrução.\nO ativo não tem uso alternativo e a entidade tem direito a receber o pagamento pelo desempenho já realizado.\nA situação se enquadra com clareza no item 2.\nAnalisando as alternativas\n(A) somente após a emissão do certificado de aceitação técnica\n❌ Reconhecimento apenas no final não atende ao critério, pois o cliente já controla a construção ao longo do\ntempo.\n(B) no momento da conclusão da obra\n❌ Igual à (A), incorreto.\n(C) no início do contrato, pois o pagamento mensal caracteriza o reconhecimento da receita\n❌ O pagamento mensal não é, por si só, critério de reconhecimento; a receita depende do progresso da obra,\nnão do início.\n(D) ao longo do tempo, pois o desempenho da entidade cria ou melhora ativo que o cliente controlará à medida\nque é construído\n✅ Exatamente o que a NBC TG 47 determina.\n✅ Gabarito: (D) ao longo do tempo, pois o desempenho da entidade cria ou melhora ativo que o cliente\ncontrolará à medida que é construído.", "answer": "D"}, {"n": 33, "question": "Uma empresa S.A. celebrou um contrato no valor de R$ 30.000,00 para utilizar um equipamento por um período\nde 10 meses, cujo ativo subjacente do contrato foi considerado de baixo valor pela empresa.\nA administração da empresa S.A. decidiu aplicar a isenção de reconhecimento autorizada pelo item 5 da NBC\nTG 06 (R3).\nConsiderando-se as informações apresentadas e os preceitos da NBC TG 06 (R3) – ARRENDAMENTOS, o\ntratamento contábil para esse contrato é\n(A) registrar o valor total do contrato antecipadamente como despesa no início do contrato.\n(B) capitalizar o valor do contrato como ativo imobilizado, amortizando ao longo do contrato.\n(C) reconhecer os pagamentos do arrendamento como despesa no resultado, de forma linear ou sistemática,\nao longo do prazo do contrato.\n(D) reconhecer um ativo de direito de uso e um passivo de arrendamento, ambos, ao valor presente estipulado\nno contrato.", "comment": "Vamos analisar com base na NBC TG 06 (R3) – Arrendamentos (equivalente ao CPC 06 / IFRS 16):\n1️ - Regra geral da NBC TG 06 (R3)\n•\nRegra geral: todo contrato de arrendamento deve gerar:\no\num ativo de direito de uso (direito de usar o bem) e\no\num passivo de arrendamento (obrigação de pagar).\n•\nEsses valores são mensurados pelo valor presente dos pagamentos.\n2️ - Exceções (item 5 da norma)\nA norma, no item 5, permite isenção de reconhecimento em duas situações:\n•\nArrendamentos de curto prazo (prazo ≤ 1️2️ meses, sem opção de compra), e\n•\nArrendamentos de ativo de baixo valor.\nNo caso apresentado:\n•\nPrazo: 1️0 meses → curto prazo (≤1️2️ meses).\n•\nAtivo subjacente: classificado como baixo valor.\nAssim, a empresa pode optar por não reconhecer ativo de direito de uso nem passivo de arrendamento.\n3 - Tratamento contábil permitido\nQuando a entidade opta pela isenção, a norma estabelece que:\n“Os pagamentos do arrendamento devem ser reconhecidos como despesa no resultado, de forma linear ou\ncom outra base sistemática que melhor represente o padrão de consumo dos benefícios.”\nOu seja:\n•\nNão capitaliza no imobilizado.\n•\nNão registra ativo de direito de uso nem passivo.\n•\nReconhece como despesa operacional mensalmente, conforme o tempo.\n4 - Analisando as alternativas\n(A) Registrar o valor total do contrato antecipadamente como despesa no início do contrato.\n❌ Incorreto — a despesa deve ser reconhecida ao longo do contrato, não integralmente no início.\n(B) Capitalizar o valor do contrato como ativo imobilizado, amortizando ao longo do contrato.\n❌ Incorreto — isso seria a regra geral, mas a isenção dispensa essa capitalização.\n(C) Reconhecer os pagamentos do arrendamento como despesa no resultado, de forma linear ou sistemática,\nao longo do prazo do contrato.\n✅ Correto — é exatamente o tratamento permitido pela isenção.\n(D) Reconhecer um ativo de direito de uso e um passivo de arrendamento, ambos ao valor presente\nestipulado no contrato.\n❌ Incorreto — isso é a regra geral, mas foi dispensada pela isenção.\n✅ Gabarito: (C) reconhecer os pagamentos do arrendamento como despesa no resultado, de forma linear ou\nsistemática, ao longo do prazo do contrato.", "answer": "C"}, {"n": 34, "question": "Uma empresa que atua na produção de medicamentos há 10 anos decidiu trocar dois de seus equipamentos\n(classificados como ativo imobilizado) mais relevantes por outros com tecnologia mais atualizada com o objetivo\nde redução nos seus custos de produção.\nAs informações sobre os equipamentos retirados de operação são relatadas a seguir:\nEquipamento 1\nValor Contábil Líquido = R$ 500.000,00\nValor Justo Líquido = R$ 750.000,00\nEquipamento 2\nValor Contábil Líquido = R$ 1.500.000,00\nValor Justo Líquido = R$ 1.250.000,00\nSabendo que os novos equipamentos adquiridos já estão em uso, um plano de venda desses ativos\n(Equipamentos 1 e 2) foi submetido e aprovado pelo Conselho de Administração, que considerou a venda\naltamente provável de ser concluída nos próximos 12 meses.\nLogo, segundo a NBC TG 31 (R3) – ATIVO NÃO CIRCULANTE MANTIDO PARA VENDA E OPERAÇÃO\nDESCONTINUADA, a mensuração subsequente dos equipamentos a ser adotada pela empresa a partir da\ndecisão do Conselho de Administração é:\n(A) Equipamento 1 por R$ 500.000,00 e Equipamento 2 por R$ 1.250.000,00.\n(B) Equipamento 1 por R$ 500.000,00 e Equipamento 2 por R$ 1.500.000,00.\n(C) Equipamento 1 por R$ 750.000,00 e Equipamento 2 por R$ 1.500.000,00.\n(D) Equipamento 1 por R$ 750.000,00 e Equipamento 2 por R$ 1.250.000,00.", "comment": "Vamos aplicar a NBC TG 31 (R3) – Ativo Não Circulante Mantido para Venda e Operação Descontinuada.\nPasso 1 – Reclassificação para mantido para venda\nQuando o ativo é classificado como mantido para venda e a venda é altamente provável de ocorrer em até 12\nmeses, a norma determina que:\nO ativo deve ser mensurado pelo menor entre:\n•\no valor contábil líquido e\n•\no valor justo líquido de despesas de venda.\nE a depreciação é interrompida.\nPasso 2 – Analisar cada equipamento\nEquipamento 1\n•\nValor contábil líquido: R$ 500.000,00\n•\nValor justo líquido: R$ 750.000,00\n•\nMenor valor = R$ 500.000,00\nSerá registrado por R$ 500.000,00.\nEquipamento 2\n•\nValor contábil líquido: R$ 1.500.000,00\n•\nValor justo líquido: R$ 1.250.000,00\n•\nMenor valor = R$ 1.250.000,00\nSerá registrado por R$ 1.250.000,00.\nPasso 3 – Conclusão\nDe acordo com a NBC TG 31 (R3), após a decisão do Conselho:\n•\nEquipamento 1 → R$ 500.000,00\n•\nEquipamento 2 → R$ 1.250.000,00\n✅ Gabarito: (A) Equipamento 1 por R$ 500.000,00 e Equipamento 2 por R$ 1.250.000,00.", "answer": "A"}, {"n": 35, "question": "A Contabilidade de Custos possui uma linguagem própria que permite ao profissional da contabilidade constituir\no processo de análise, apuração e divulgação das informações relacionadas a custos, à medida que se\nmostrarem pertinentes de acordo com a necessidade informacional dos inúmeros stakeholders.\nTomando por base esse processo de terminologias na contabilidade de custos, assinale a afirmativa correta.\n(A) Os gastos representam a compra de um produto ou serviço que tem por capacidade gerar o dispêndio de\nrecursos financeiros por parte da empresa, a exemplo da aquisição de um imobilizado.\n(B) Os custos representam um sacrifício monetário referente ao pagamento dos gastos, a exemplo do consumo\nde matéria-prima.\n(C) As despesas podem ser entendidas como os recursos utilizados na constituição de bens ou serviços em\numa indústria, como exemplo tem-se as despesas com vendas e comissões.\n(D) As perdas são gastos anormais e involuntários do processo produtivo e já estão incluídas no custo do\nproduto.", "comment": "Vamos analisar cada conceito da Contabilidade de Custos, conforme a terminologia consagrada (autores como\nEliseu Martins, Leone, Bornia, e a prática contábil brasileira):\n(A) Os gastos representam a compra de um produto ou serviço que tem por capacidade gerar o dispêndio de\nrecursos financeiros por parte da empresa, a exemplo da aquisição de um imobilizado.\n✅ Correto.\n•\nGasto é todo sacrifício financeiro com a aquisição de bens ou serviços, independentemente\ndo uso imediato.\n•\nPode ser pago à vista ou a prazo.\n•\nExemplos: compra de matéria-prima, aquisição de um imobilizado, contratação de um\nserviço.\n•\nA compra do imobilizado é realmente um gasto (depois ele será ativo e poderá gerar\ndepreciação como custo ou despesa).\n(B) Os custos representam um sacrifício monetário referente ao pagamento dos gastos, a exemplo do consumo\nde matéria-prima.\n❌ Incorreto.\n•\nCusto não é “pagamento de gasto”, e sim o consumo de fatores de produção na fabricação\nde bens ou serviços.\n•\nO exemplo de consumo de matéria-prima até se encaixa como custo, mas a definição está\nerrada ao dizer que é “referente ao pagamento”.\n(C) As despesas podem ser entendidas como os recursos utilizados na constituição de bens ou serviços em\numa indústria, como exemplo tem-se as despesas com vendas e comissões.\n❌ Incorreto.\n•\nEssa definição confunde despesa com custo.\n•\nDespesa é gasto consumido para obtenção de receita, fora do processo de fabricação (ex.:\nvendas, administrativas).\n•\nNão é “constituição de bens ou serviços”.\n(D) As perdas são gastos anormais e involuntários do processo produtivo e já estão incluídas no custo do\nproduto.\n❌ Incorreto.\n•\nPerdas são realmente gastos anormais e involuntários (ex.: incêndio, roubo, quebras\nanormais), mas não são incluídas no custo do produto.\n•\nSão lançadas diretamente como despesa do período.\n✅ Gabarito\n(A) Os gastos representam a compra de um produto ou serviço que tem por capacidade gerar o dispêndio de\nrecursos financeiros por parte da empresa, a exemplo da aquisição de um imobilizado.", "answer": "A"}, {"n": 36, "question": "Uma empresa realizou a contagem de seus estoques, acabando por superavaliar o estoque inicial, mantendo\no controle de compras e estoque final nos valores corretos.\nCom base nessa situação, o procedimento contábil incorreto afirmar que\n(A) a receita de vendas do período corrente foi subavaliada.\n(B) o lucro do período corrente foi superavaliado.\n(C) o custo dos produtos vendidos do período corrente foi superavaliado.\n(D) o estoque final foi subavaliado.", "comment": "Vamos analisar com base na fórmula do Custo das Mercadorias Vendidas (CMV):\nCMV=EI+Compras–EF\nOnde:\n•\nEI = Estoque inicial\n•\nEF = Estoque final\nSituação\n•\nO estoque inicial foi superavaliado.\n•\nCompras e estoque final estão corretos.\nEfeitos em cadeia\n1. CMV (custo das mercadorias vendidas)\no\nSe o EI está maior, então\nCMV = EI + Compras –EF fica maior.\no\nResultado: CMV superavaliado.\n2. Lucro do período\no\nLucro = Receita – CMV – despesas.\no\nSe o CMV é maior, o lucro fica menor (subavaliado), não maior.\n3. Receita de vendas\no\nA avaliação de estoque não altera as vendas registradas.\no\nReceita de vendas permanece correta.\n4. Estoque final\no\nO estoque final foi informado como correto.\no\nPortanto, não está subavaliado.\nAnalisando as alternativas\n(A) A receita de vendas do período corrente foi subavaliada.\n❌ Incorreto. A receita de vendas não é afetada.\n(B) O lucro do período corrente foi superavaliado.\n❌ Incorreto. O lucro foi subavaliado (ficou menor, não maior).\n(C) O custo dos produtos vendidos do período corrente foi superavaliado.\n✅ Correto. O EI maior fez o CMV maior.\n(D) O estoque final foi subavaliado.\n❌ Incorreto. O estoque final está correto.\n✅ Gabarito: (C) o custo dos produtos vendidos do período corrente foi superavaliado.", "answer": "C"}, {"n": 37, "question": "A Fazenda Laticínios Campo Verde Ltda. produz e comercializa queijos artesanais tipo minas frescal. No mês\nde julho de 2025, quando a empresa não possuía estoque inici
